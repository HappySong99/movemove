  // flow 속성이 있으면 체험형 화면으로 분기 (실제 완료는 체험 끝에서 처리)
  if (event.flow) {
    state.flags._adminFlowStep = 0;  // 매번 처음부터 시작
    saveGame();
    go('ch6_admin_flow');
    return;
  }
  if (event.onComplete) event.onComplete();
  state.ch6DayIdx = idx + 1;
  saveGame();
  setTimeout(() => render(), 300);
}

// 챕터 6 — event 타입 선택지 처리
function ch6PickChoice(choiceIdx) {
  const idx = state.ch6DayIdx || 0;
  const event = CH6_EVENTS[idx];
  const choice = event.choices[choiceIdx];

  // 이미 답한 경우 무시 (안전장치)
  if (state.flags._ch6Picked && state.flags._ch6Picked[idx] !== undefined) return;

  if (choice.onPick) choice.onPick();
  state.knowledge += 1;

  // 아쉬운 선택은 오답노트에 기록
  if (!choice.correct) {
    const correctChoice = event.choices.find(c => c.correct);
    logWrongChoice({
      title: event.title,
      desc: event.desc,
      picked: choice.label + (choice.result ? ' → ' + choice.result : ''),
      correctAnswer: correctChoice ? correctChoice.label : '',
      explanation: event.learn || '',
    });
  }

  // 선택 상태 기록 → 같은 화면 재렌더링으로 정답·결과·팁 노출
  if (!state.flags._ch6Picked) state.flags._ch6Picked = {};
  state.flags._ch6Picked[idx] = choiceIdx;
  saveGame();
  render();
}

function ch6Advance() {
  state.ch6DayIdx = (state.ch6DayIdx || 0) + 1;
  saveGame();
  render();
}

// event 타입에서 정답+correctFlow가 있을 때 체험 화면으로 이동
function ch6StartCorrectFlow() {
  const idx = state.ch6DayIdx || 0;
  const event = CH6_EVENTS[idx];
  if (!event || !event.correctFlow) {
    ch6Advance();
    return;
  }
  state.flags._kakaoStep = 0;
  saveGame();
  if (event.correctFlow === 'kakao_notify') {
    go('ch6_kakao_notify');
  } else {
    // 알 수 없는 flow는 그냥 진행
    ch6Advance();
  }
}

function renderAdminFlowStepContent(event, step, isJeonip) {
  const L = (typeof LISTINGS !== 'undefined') ? LISTINGS.find(l => l.id === state.chosenListing) : null;
  const newAddr = (L && L.iros && L.iros.head && L.iros.head.address)
    ? L.iros.head.address
    : '서울시 ○○구 ○○동 ○○로 12, 301호';

  // STEP 1 — 본인인증
  if (step === 1) {
    return `
      <div class="gov-mockcard">
        <div class="row"><span class="lbl">인증 방식</span><span class="val">카카오 간편인증</span></div>
        <div class="row"><span class="lbl">상태</span><span class="val" style="color:#16A34A">✓ 인증 완료</span></div>
      </div>
    `;
  }

  // STEP 2 — 신청서 작성
  if (step === 2) {
    if (isJeonip) {
      return `
        <div class="gov-mockcard">
          <div class="row"><span class="lbl">신청 종류</span><span class="val">전입신고</span></div>
          <div class="row"><span class="lbl">이전 주소</span><span class="val" style="color:#9CA3AF;text-decoration:line-through">서울시 ○○구 ○○동</span></div>
          <div class="row"><span class="lbl">새 주소</span><span class="val">${newAddr}</span></div>
          <div class="row"><span class="lbl">전입 사유</span><span class="val">주거 이전</span></div>
        </div>
      `;
    }
    return `
      <div class="gov-mockcard">
        <div class="row"><span class="lbl">신청 종류</span><span class="val">확정일자 부여</span></div>
        <div class="row"><span class="lbl">주소</span><span class="val">${newAddr}</span></div>
        <div class="row"><span class="lbl">계약서</span><span class="val" style="color:#16A34A">📎 첨부 완료</span></div>
        <div class="row"><span class="lbl">수수료</span><span class="val">600원</span></div>
      </div>
    `;
  }

  // STEP 3 — 결제 (확정일자만) or 접수 중 (전입신고)
  if (step === 3 && !isJeonip) {
    return `
      <div class="gov-mockcard">
        <div class="row"><span class="lbl">결제 금액</span><span class="val" style="font-size:16px">600원</span></div>
        <div class="row"><span class="lbl">결제 수단</span><span class="val">간편결제</span></div>
      </div>
    `;
  }

  // 마지막 단계 — 완료 도장
  const isLast = (isJeonip && step === 4) || (!isJeonip && step === 4);
  if (isLast) {
    const today = new Date();
    const dateStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
    return `
      <div class="gov-stamp-wrap">
        <div class="gov-stamp">
          <div class="gov-stamp-top">대한민국</div>
          <div class="gov-stamp-main">${isJeonip ? '신고완료' : '확정일자'}</div>
          <div class="gov-stamp-bottom">${dateStr}</div>
        </div>
        <div style="font-size:13px;color:#16A34A;font-weight:700">
          ✓ ${isJeonip ? '전입신고가 접수되었어요' : '확정일자가 부여되었어요'}
        </div>
      </div>
    `;
  }

  return '';
}

// 정부24 체험 다음 단계
function adminFlowNext() {
  const idx = state.ch6DayIdx || 0;
  const event = CH6_EVENTS[idx];
  const isJeonip = event.flow === 'jeonip';
  const totalSteps = isJeonip ? 5 : 5;
  const step = state.flags._adminFlowStep || 0;

  // 마지막 단계에서 "확인" 버튼 → 실제 완료 처리하고 다음 미션으로
  if (step >= totalSteps - 1) {
    if (event.onComplete) event.onComplete();
    state.ch6DayIdx = idx + 1;
    state.flags._adminFlowStep = 0; // 리셋
    saveGame();
    go('ch6_day_view');
    return;
  }

  state.flags._adminFlowStep = step + 1;
  saveGame();
  render();
}

/* -------------------------------------------------------------------
   [LOGIC] 점수 계산 (수정 용이하게 분리)
   ─────────────────────────────────────────────
   설계 원칙:
   1. 기본 점수는 체크리스트/학습/올바른 선택의 합으로 결정
   2. 위험 매물·보증보험 거절·대출 거절은 합산 전에 차감
      (단순 cap이 아니라 실제로 최종 점수에 반영)
   3. 치명적 실수(위험 매물 선택)는 등급 자체에 상한 적용
------------------------------------------------------------------- */
function calculateScore() {
  const checklistCount = Object.keys(state.checklist).filter(k => state.checklist[k]).length;
  const knowledge = state.knowledge;
  const correctChoices = state.scoreLog.filter(s => s.includes('correct')).length;
  const wrongChoices = state.scoreLog.filter(s => s.includes('wrong') || s.includes('ignore')).length;

  // ── 기본 점수 (가산점) ────────────────────────
  const basePositive =
    Math.min(checklistCount, 24) * 2 +     // 최대 48점 (체크리스트 25개로 확장)
    Math.min(knowledge, 30) +              // 최대 30점
    Math.min(correctChoices, 12) * 2;      // 최대 24점, 총합 최대 102점

  // ── 페널티 (감점) ────────────────────────────
  const chosen = LISTINGS.find(l => l.id === state.chosenListing);
  const dangerPenalty       = chosen && chosen.danger ? -30 : 0;       // 위험 매물 선택: 매우 큼
  const insuranceDenied     = state.flags.insuranceDenied ? -10 : 0;   // 보증보험 거절
  const loanDenied          = state.flags.loanDenied ? -15 : 0;        // 대출 거절
  const splitPenalty        = state.scoreLog.includes('balance_split') ? -10 : 0;
  const wrongPenalty        = wrongChoices * -3;
  const protectionPenalty   = (!state.flags.jeonipDone || !state.flags.hwakjeongDone) ? -20 : 5;
  const budgetPenalty       = state.budget < 0 ? -15 : 0;              // 자금 마이너스

  const totalPenalty =
    dangerPenalty + insuranceDenied + loanDenied +
    splitPenalty + wrongPenalty + protectionPenalty + budgetPenalty;

  // ── 최종 점수 계산 ───────────────────────────
  let score = basePositive + totalPenalty;
  score = Math.max(0, Math.min(100, score));

  // ── 등급 산정 + 등급 상한 ────────────────────
  let grade = 'D';
  if (score >= 80) grade = 'A';
  else if (score >= 60) grade = 'B';
  else if (score >= 40) grade = 'C';

  // 위험 매물 선택 시 A 등급 불가 (최대 B)
  if (chosen && chosen.danger && grade === 'A') {
    grade = 'B';
    score = Math.min(score, 75);
  }
  // 대출 거절 → 자금 조달 실패 시 최대 C
  if (state.flags.loanDenied && (grade === 'A' || grade === 'B')) {
    grade = 'C';
    score = Math.min(score, 55);
  }

  return {
    score, grade,
    checklistCount, knowledge, correctChoices, wrongChoices,
    dangerPenalty, insuranceDenied, loanDenied,
    splitPenalty, protectionPenalty, budgetPenalty,
  };
}

            const done = state.checklist[c.key];
            return `
              <div class="info-row" style="border:none;padding:6px 0">
                <span class="info-label" style="display:flex;align-items:center;gap:8px">
                  <span style="opacity:${done ? 1 : 0.3}">${c.icon}</span>
                  <span style="${done ? '' : 'color:var(--color-text-tertiary)'}">${c.text}</span>
                </span>
                <span class="info-value ${done ? 'good' : ''}" style="${done ? '' : 'color:var(--color-text-tertiary)'}">${done ? '✓' : '—'}</span>
              </div>
            `;
          }).join('')}
        </div>
      </div>

      ${renderEndingReviewCard()}

      ${result.protectionPenalty < 0 ? `
        <div class="danger-box">
          <div class="danger-box-header">⚠ 가장 중요한 걸 놓쳤어요</div>
          <div class="danger-box-content">
            전입신고와 확정일자를 모두 받지 않았어요.<br/>
            실제 상황이었다면 임대인이 잠적했을 때 보증금을 잃을 수 있어요.<br/><br/>
            <b>이사 다음 날 = 정부24에서 전입신고 + 확정일자</b><br/>
            이 한 줄만 기억해도 충분해요.
          </div>
        </div>
      ` : `
        <div class="learn-box">
          <div class="learn-box-header">🎉 보증금이 안전해요</div>
          <div class="learn-box-content">
            <b>전입신고 + 확정일자</b>를 모두 받으셨네요.<br/>
            이제 임대인이 잠적해도, 건물이 경매로 넘어가도<br/>
            법이 당신의 보증금을 지켜줘요.
          </div>
        </div>
      `}

      <div class="card mt-16">
        <h3 class="card-title">📋 실제 이사 때 기억하세요</h3>
        <div class="card-body">
          <ul style="padding-left:18px;margin:8px 0">
            <li><b>등기부등본</b>은 계약 당일 직접 발급 (iros.go.kr)</li>
            <li><b>특약</b>에 "근저당 말소" "보증보험 가능" 명시</li>
            <li><b>이체한도</b>는 1주일 전 미리 상향</li>
            <li><b>도시가스</b>는 지역마다 회사 다름, 직접 신청</li>
            <li><b>검침 사진</b>은 이사 당일 반드시</li>
            <li><b>전입신고 + 확정일자</b>는 다음 날 즉시</li>
            <li><b>옵션 하자</b>는 1개월 내 신고</li>
          </ul>
        </div>
      </div>

      <div class="card">
        <h3 class="card-title">💚 게임을 마치며</h3>
        <div class="card-body">
          이 게임이 실제 이사에 작은 도움이라도 되었으면 좋겠어요.<br/><br/>
          기억하세요, 모르는 게 당연해요.<br/>
          첫 이사는 누구나 처음이니까요.
        </div>
      </div>
    </div>
    <div class="bottom-cta" style="background:linear-gradient(to bottom, rgba(255,255,255,0) 0%, var(--color-bg) 30%);">
      <button class="cta-button" onclick="confirmReset()">처음부터 다시</button>
    </div>
  `;
});

function confirmReset() {
  if (confirm('처음부터 다시 시작할까요?\n모든 진행이 초기화됩니다.')) {
    resetGame();
  }
}

// ─────────────────────────────────────────────
// 챕터 선택 시트 (옵션 A: 학습/테스트용 점프)
// ─────────────────────────────────────────────
const CHAPTER_MAP = [
  { n: 0, title: '처음으로', desc: '인트로 화면부터 다시', icon: '🏠', scene: 'intro' },
  { n: 1, title: 'CH 1 · 집 찾기', desc: '예산·매물 비교·방문', icon: '🔍', scene: 'ch1_intro' },
  { n: 2, title: 'CH 2 · 계약과 대출', desc: '등기부·특약·계약·보증보험', icon: '📋', scene: 'ch2_intro' },
  { n: 3, title: 'CH 3 · 이사 준비', desc: '짐 정리·이사업체 선정', icon: '📦', scene: 'ch3_intro' },
  { n: 4, title: 'CH 4 · 이사 전 준비', desc: '인터넷·가스·청소 예약', icon: '📞', scene: 'ch4_intro' },
  { n: 5, title: 'CH 5 · D-DAY', desc: '잔금·열쇠·하자 점검', icon: '🔑', scene: 'ch5_intro' },
  { n: 6, title: 'CH 6 · 입주 후 정착', desc: '전입신고·확정일자·D+14', icon: '🏡', scene: 'ch6_intro' },
];

function openChapterSelect() {
  const items = CHAPTER_MAP.map(c => `
    <div class="chapter-jump-item ${state.chapter === c.n ? 'current' : ''}"
         onclick="jumpToChapter(${c.n})">
      <div class="chapter-jump-icon">${c.icon}</div>
      <div class="chapter-jump-body">
        <div class="chapter-jump-title">${c.title} ${state.chapter === c.n ? '<span class="chapter-jump-now">현재</span>' : ''}</div>
        <div class="chapter-jump-desc">${c.desc}</div>
      </div>
      <div class="chapter-jump-arrow">→</div>
    </div>
  `).join('');

  openSheet(`
    <div class="sheet-title">📚 챕터 선택</div>
    <p class="text-secondary text-sm" style="margin-bottom:12px">원하는 챕터로 바로 이동해서 학습할 수 있어요.</p>

    <div class="warn-box" style="margin-bottom:12px">
      <div class="warn-box-content" style="font-size:13px">
        ⚠ 챕터를 점프하면 <b>현재 진행 상태가 초기화되고, 해당 챕터에 필요한 기본 설정이 자동으로 적용</b>돼요.
      </div>
    </div>

    ${items}

    <button class="cta-button mt-16" style="background:var(--color-surface-2);color:var(--color-text-secondary)" onclick="closeSheet()">닫기</button>
  `);
}

function jumpToChapter(n) {
  const target = CHAPTER_MAP.find(c => c.n === n);
  if (!target) return;
  // 현재 챕터로 점프하려는 경우는 그냥 닫기
  if (state.chapter === n && state.scene === target.scene) {
    closeSheet();
    return;
  }
  if (!confirm(`${target.title}(으)로 이동할까요?\n현재 진행 상태가 초기화됩니다.`)) return;

  closeSheet();
  // 상태 초기화 후 챕터별 최소 상태 세팅
  resetStateForJump();
  setupChapterPrereq(n);
  state.chapter = n;
  state.scene = target.scene;
  state.sceneHistory = [];
  saveGame();
  render();
}

// 챕터 점프용 상태 초기화 (저장은 살리되 진행 플래그만 리셋)
function resetStateForJump() {
  state.flags = {};
  state.scoreLog = [];
  state.ch5MissionIdx = 0;
  state.ch6DayIdx = 0;
  state.sceneHistory = [];
}

// 챕터별 사전 조건 세팅 — 점프 대상 챕터가 실행되는 데 필요한 최소 상태
function setupChapterPrereq(n) {
  if (n === 0) {
    // 처음으로 — 완전 초기화에 가깝게
    state.chapter = 0;
    state.budget = 0;
    state.initialBudget = 0;
    state.chosenListing = null;
    state.knowledge = 0;
    return;
  }
  // CH1 이상: 기본 예산 세팅
  if (!state.initialBudget || state.initialBudget === 0) {
    state.budget = 150_000_000;        // 1억 5천만
    state.initialBudget = 150_000_000;
  }
  // CH2 이상: 매물 선택 + 가계약금 송금 완료 상태
  if (n >= 2) {
    if (!state.chosenListing) state.chosenListing = 'J1'; // 안전한 전세 매물
    const L = LISTINGS.find(l => l.id === state.chosenListing);
    if (L) {
      const pre = getPreDeposit(L.deposit);
      state.flags.preDeposit = pre;
      state.flags.ch1Done = true;
    }
  }
  // CH3 이상: 계약·대출·보증보험 완료
  if (n >= 3) {
    state.flags.stamps = { landlord: true, tenant: true, agent: true };
    state.flags.contract_signed = true;
    state.flags.deposit_sent = true;
    state.flags.insuranceDenied = false;
  }
  // CH5 이상: 이사 준비 완료
  if (n >= 5) {
    state.flags.internet = 'internet_a';
    state.flags.gas = true;
  }
  // CH6 이상: D-DAY 미션 완료
  if (n >= 6) {
    state.flags.defects = {};
    state.ch5MissionIdx = 99; // 모든 미션 통과 표시
  }
}

/* ===================================================================
   초기화 — 페이지 로드 시 실행
=================================================================== */
window.addEventListener('DOMContentLoaded', () => {
  // 저장된 게임 자동 로드 시도
  loadGame();
  render();
});
</script>
</body>
</html>
