<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>첫 걸음 — 대한민국 사회초년생 이사 시뮬레이션</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
/* ===================================================================
   디자인 토큰 (토스 스타일)
=================================================================== */
:root {
  --color-bg: #FFFFFF;
  --color-surface: #F9FAFB;
  --color-surface-2: #F2F4F6;
  --color-primary: #22C55E;
  --color-primary-dark: #16A34A;
  --color-primary-soft: #ECFDF5;
  --color-text-primary: #191F28;
  --color-text-secondary: #4E5968;
  --color-text-tertiary: #8B95A1;
  --color-border: #E5E8EB;
  --color-border-soft: #F2F4F6;
  --color-warning-bg: #FFF7E6;
  --color-warning: #B7791F;
  --color-warning-strong: #DD6B20;
  --color-info-bg: #EBF8FF;
  --color-info: #2B6CB0;
  --color-danger-bg: #FFF5F5;
  --color-danger: #C53030;
  --color-purple-bg: #FAF5FF;
  --color-purple: #6B46C1;

  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.06);
  --shadow-popup: 0 8px 24px rgba(0, 0, 0, 0.12);

  --radius-card: 16px;
  --radius-button: 12px;
  --radius-chip: 8px;
  --radius-pill: 999px;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: #F2F4F6;
  color: var(--color-text-primary);
  line-height: 1.5;
  letter-spacing: -0.01em;
  font-feature-settings: "ss06" on;
  overscroll-behavior: none;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
}

/* ===================================================================
   앱 컨테이너 (모바일 퍼스트 — 가운데 정렬)
=================================================================== */
#app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  margin: 0 auto;
  background: var(--color-bg);
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 40px rgba(0,0,0,0.04);
}

/* ===================================================================
   상단 헤더 (D-Day + 자원)
=================================================================== */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--color-bg);
  border-bottom: 1px solid var(--color-border-soft);
  padding: 14px 20px 12px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.dday-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--color-primary-soft);
  color: var(--color-primary-dark);
  font-size: 13px;
  font-weight: 700;
  border-radius: var(--radius-pill);
  letter-spacing: -0.02em;
}

.chapter-label {
  font-size: 12px;
  color: var(--color-text-tertiary);
  font-weight: 500;
}

/* 헤더 좌/우 그룹 — 버튼 묶음 정렬 */
.header-top-left,
.header-top-right {
  display: flex;
  align-items: center;
  gap: 6px;
}
.header-top-right {
  flex-shrink: 0;
}

/* 좁은 화면 (작은 모바일)에서 헤더 공간 확보 */
@media (max-width: 380px) {
  .chapter-label { display: none; }
  .locker-btn-text,
  .home-btn-text,
  .back-btn-text { display: none; }
  .locker-btn,
  .home-btn { padding: 6px 9px; }
}

.header-resources {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: var(--color-text-secondary);
}

.resource-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.resource-item .icon {
  font-size: 13px;
}

.resource-item .value {
  font-weight: 700;
  color: var(--color-text-primary);
  font-variant-numeric: tabular-nums;
}

/* ===================================================================
   메인 콘텐츠 영역
=================================================================== */
.main-content {
  flex: 1;
  padding: 20px;
  padding-bottom: 120px;
  animation: fadeInUp 0.35s ease-out;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===================================================================
   카드 컴포넌트
=================================================================== */
.card {
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: 20px;
  margin-bottom: 12px;
}

.card-flat {
  background: var(--color-surface);
  border-radius: var(--radius-card);
  padding: 20px;
  margin-bottom: 12px;
}

.card-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin: 0 0 10px;
  letter-spacing: -0.02em;
  line-height: 1.35;
}

.card-subtitle {
  font-size: 14px;
  color: var(--color-text-secondary);
  margin: 0 0 16px;
  line-height: 1.55;
}

.card-body {
  font-size: 15px;
  color: var(--color-text-primary);
  line-height: 1.6;
}

.card-body p {
  margin: 0 0 12px;
}

.card-body p:last-child {
  margin-bottom: 0;
}

/* 화면 타이틀 */
.screen-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin: 8px 0 4px;
  letter-spacing: -0.03em;
  line-height: 1.3;
}

.screen-subtitle {
  font-size: 15px;
  color: var(--color-text-secondary);
  margin: 0 0 20px;
  line-height: 1.55;
}

/* ===================================================================
   선택지 (CTA + 보조)
=================================================================== */
.choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 8px;
}

.choice-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 18px 20px;
  background: var(--color-surface);
  border-radius: var(--radius-button);
  font-size: 15px;
  font-weight: 600;
  color: var(--color-text-primary);
  text-align: left;
  transition: all 0.15s ease;
  line-height: 1.45;
  letter-spacing: -0.01em;
}

.choice-btn:active {
  background: var(--color-surface-2);
  transform: scale(0.99);
}

.choice-btn .arrow {
  color: var(--color-text-tertiary);
  font-size: 18px;
  flex-shrink: 0;
  margin-left: 12px;
}

.choice-btn.recommended {
  background: var(--color-primary-soft);
  color: var(--color-primary-dark);
}

.choice-btn.recommended .arrow {
  color: var(--color-primary);
}

/* ===================================================================
   하단 고정 CTA
=================================================================== */
.bottom-cta {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  padding: 16px 20px 28px;
  background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, var(--color-bg) 30%);
  z-index: 50;
}

.cta-button {
  width: 100%;
  height: 56px;
  background: var(--color-primary);
  color: white;
  font-size: 16px;
  font-weight: 700;
  border-radius: var(--radius-button);
  letter-spacing: -0.01em;
  transition: all 0.15s ease;
}

.cta-button:active {
  background: var(--color-primary-dark);
  transform: scale(0.99);
}

.cta-button:disabled {
  background: var(--color-border);
  color: var(--color-text-tertiary);
  cursor: not-allowed;
}

.cta-button.secondary {
  background: var(--color-surface);
  color: var(--color-text-primary);
}

.cta-button.secondary:active {
  background: var(--color-surface-2);
}

/* ===================================================================
   학습 박스
=================================================================== */
.learn-box {
  background: var(--color-info-bg);
  border-radius: var(--radius-card);
  padding: 18px 20px;
  margin: 16px 0 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.learn-box-header {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 700;
  color: var(--color-info);
  letter-spacing: -0.01em;
}

.learn-box-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin: 0;
  line-height: 1.45;
}

.learn-box-content {
  font-size: 14px;
  color: var(--color-text-primary);
  line-height: 1.6;
  letter-spacing: -0.005em;
}

.learn-box-content ul {
  margin: 6px 0 0;
  padding-left: 18px;
}

.learn-box-content li {
  margin-bottom: 4px;
}

/* 경고 박스 */
.warn-box {
  background: var(--color-warning-bg);
  border-radius: var(--radius-card);
  padding: 16px 18px;
  margin: 12px 0;
}

.warn-box-header {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 700;
  color: var(--color-warning-strong);
  margin-bottom: 4px;
}

.warn-box-content {
  font-size: 14px;
  color: var(--color-text-primary);
  line-height: 1.55;
}

/* 위험 박스 */
.danger-box {
  background: var(--color-danger-bg);
  border-radius: var(--radius-card);
  padding: 16px 18px;
  margin: 12px 0;
}

.danger-box-header {
  font-size: 13px;
  font-weight: 700;
  color: var(--color-danger);
  margin-bottom: 4px;
}

.danger-box-content {
  font-size: 14px;
  color: var(--color-text-primary);
  line-height: 1.55;
}

/* ===================================================================
   매물 카드
=================================================================== */
.listing-card {
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: 18px;
  margin-bottom: 10px;
  transition: all 0.15s ease;
  position: relative;
}

.listing-card:active {
  transform: scale(0.99);
  background: var(--color-surface);
}

/* 한 번이라도 살펴본 매물 — 좌측 강조 + 옅은 배경 */
.listing-card.visited {
  background: var(--color-primary-soft);
  border-color: var(--color-primary);
  border-left: 4px solid var(--color-primary);
  padding-left: 15px;
}

.listing-card.visited:active {
  background: #DEFCE5;
}

.listing-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 8px;
}

.listing-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin: 0;
  line-height: 1.4;
}

.listing-tag {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: var(--radius-chip);
  background: var(--color-surface);
  color: var(--color-text-secondary);
}

.listing-tag.hot {
  background: var(--color-danger-bg);
  color: var(--color-danger);
}

.listing-tag.cheap {
  background: var(--color-warning-bg);
  color: var(--color-warning-strong);
}

.listing-tag.good {
  background: var(--color-primary-soft);
  color: var(--color-primary-dark);
}

.listing-price {
  font-size: 18px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin: 6px 0;
  letter-spacing: -0.02em;
}

.listing-meta {
  font-size: 13px;
  color: var(--color-text-secondary);
  display: flex;
  flex-wrap: wrap;
  gap: 4px 10px;
}

.listing-meta .dot {
  color: var(--color-text-tertiary);
}

.listing-meta b {
  color: var(--color-text-primary);
  font-weight: 700;
}

/* 방문 모드 배지 (등기부/낮/밤) */
.visit-badges {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed var(--color-border);
}

.visit-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-size: 14px;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  opacity: 0.4;
  filter: grayscale(0.6);
  transition: all 0.15s ease;
}

.visit-badge.done {
  background: var(--color-primary);
  border-color: var(--color-primary);
  opacity: 1;
  filter: none;
  box-shadow: 0 1px 4px rgba(34, 197, 94, 0.3);
}

/* 살펴봤지만 완료 — choice-btn에 완료 상태 표시 */
.choice-btn.completed {
  background: var(--color-primary-soft);
  color: var(--color-primary-dark);
  opacity: 0.85;
}

.choice-btn.completed .arrow {
  color: var(--color-primary);
  font-size: 14px;
}

.choice-btn.incorrect {
  background: #fff0f0;
  color: #c92a2a;
  border: 1px solid #f5b5b5;
  opacity: 0.95;
}

.choice-btn.incorrect .arrow {
  color: #c92a2a;
  font-size: 14px;
}

/* ===================================================================
   체크리스트 항목
=================================================================== */
.check-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--color-surface);
  border-radius: var(--radius-button);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.check-item:active {
  transform: scale(0.99);
}

.check-box {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--color-border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.check-item.checked .check-box {
  background: var(--color-primary);
  border-color: var(--color-primary);
}

.check-item.checked .check-box::after {
  content: '✓';
  color: white;
  font-size: 13px;
  font-weight: 800;
  animation: checkPop 0.3s ease-out;
}

@keyframes checkPop {
  from { transform: scale(0); }
  to { transform: scale(1); }
}

.check-text {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text-primary);
  line-height: 1.4;
}

.check-text .sub {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--color-text-tertiary);
  margin-top: 2px;
}

.check-item.checked .check-text {
  color: var(--color-text-tertiary);
  text-decoration: line-through;
  text-decoration-color: var(--color-text-tertiary);
}

/* ===================================================================
   진행률 바
=================================================================== */
.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--color-border-soft);
  border-radius: var(--radius-pill);
  overflow: hidden;
  margin: 8px 0;
}

.progress-fill {
  height: 100%;
  background: var(--color-primary);
  border-radius: var(--radius-pill);
  transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ===================================================================
   인포 행 (스펙 정보 같은 것)
=================================================================== */
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--color-border-soft);
  font-size: 14px;
}

.info-row:last-child {
  border-bottom: none;
}

.info-label {
  color: var(--color-text-secondary);
  font-weight: 500;
}

.info-value {
  color: var(--color-text-primary);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
}

.info-value.warn {
  color: var(--color-warning-strong);
}

.info-value.danger {
  color: var(--color-danger);
}

.info-value.good {
  color: var(--color-primary-dark);
}

/* ===================================================================
   문서 미니게임 (등기부등본 등)
=================================================================== */
.document-section {
  background: var(--color-surface);
  border-radius: var(--radius-card);
  padding: 16px 18px;
  margin-bottom: 10px;
  position: relative;
  cursor: pointer;
  transition: all 0.15s ease;
}

.document-section:active {
  background: var(--color-surface-2);
}

.document-section.found {
  background: var(--color-warning-bg);
}

.document-section.safe {
  background: var(--color-primary-soft);
}

.document-section.warn {
  background: var(--color-danger-bg);
  border: 1px solid rgba(197, 48, 48, 0.2);
}

.doc-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--color-text-tertiary);
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}

.doc-content {
  font-size: 13px;
  color: var(--color-text-primary);
  line-height: 1.5;
  font-family: 'D2Coding', 'Pretendard', monospace;
}

.doc-content .highlight {
  background: rgba(255, 149, 0, 0.2);
  padding: 1px 4px;
  border-radius: 4px;
  font-weight: 700;
}

.doc-content .danger-highlight {
  background: rgba(245, 68, 82, 0.15);
  padding: 1px 4px;
  border-radius: 4px;
  font-weight: 700;
  color: var(--color-danger);
}

/* ===================================================================
   특약 OX 카드
=================================================================== */
.special-clause-card {
  background: var(--color-surface);
  border-radius: var(--radius-card);
  padding: 16px;
  margin-bottom: 10px;
}

.special-clause-text {
  font-size: 14px;
  color: var(--color-text-primary);
  line-height: 1.55;
  margin-bottom: 12px;
}

.ox-buttons {
  display: flex;
  gap: 8px;
}

.ox-btn {
  flex: 1;
  height: 44px;
  background: var(--color-bg);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-button);
  font-size: 14px;
  font-weight: 700;
  color: var(--color-text-primary);
  transition: all 0.15s ease;
}

.ox-btn:active {
  transform: scale(0.97);
}

.ox-btn.selected.correct {
  background: var(--color-primary-soft);
  border-color: var(--color-primary);
  color: var(--color-primary-dark);
}

.ox-btn.selected.wrong {
  background: var(--color-danger-bg);
  border-color: var(--color-danger);
  color: var(--color-danger);
}

.ox-result {
  margin-top: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-chip);
  font-size: 13px;
  line-height: 1.5;
}

.ox-result.correct {
  background: var(--color-primary-soft);
  color: var(--color-primary-dark);
}

.ox-result.wrong {
  background: var(--color-danger-bg);
  color: var(--color-danger);
}

/* ===================================================================
   드래그 분류 (짐 분류)
=================================================================== */
.drag-zones {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.drag-zone {
  min-height: 120px;
  background: var(--color-surface);
  border: 2px dashed var(--color-border);
  border-radius: var(--radius-card);
  padding: 10px 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: all 0.15s ease;
}

.drag-zone.drag-over {
  border-color: var(--color-primary);
  background: var(--color-primary-soft);
}

.drag-zone-title {
  font-size: 12px;
  font-weight: 700;
  text-align: center;
  color: var(--color-text-secondary);
  margin-bottom: 4px;
}

.drag-item {
  padding: 8px 10px;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-chip);
  font-size: 12px;
  font-weight: 600;
  color: var(--color-text-primary);
  cursor: grab;
  user-select: none;
  text-align: center;
}

.drag-item:active {
  cursor: grabbing;
  opacity: 0.7;
}

.drag-item.dragging {
  opacity: 0.4;
}

.drag-pool {
  background: var(--color-surface);
  border-radius: var(--radius-card);
  padding: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  min-height: 80px;
  margin-bottom: 12px;
}

/* ===================================================================
   시계 (이사 당일)
=================================================================== */
.clock-display {
  background: var(--color-text-primary);
  color: white;
  border-radius: var(--radius-card);
  padding: 18px 20px;
  margin-bottom: 16px;
  text-align: center;
}

.clock-time {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}

.clock-label {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  margin-top: 4px;
  font-weight: 600;
}

/* ===================================================================
   엔딩 화면
=================================================================== */
.ending-hero {
  text-align: center;
  padding: 40px 20px;
}

.ending-emoji {
  font-size: 64px;
  margin-bottom: 16px;
}

.ending-grade {
  font-size: 56px;
  font-weight: 800;
  color: var(--color-primary);
  margin: 12px 0 4px;
  letter-spacing: -0.04em;
}

.ending-score {
  font-size: 18px;
  color: var(--color-text-secondary);
  font-weight: 600;
  margin-bottom: 12px;
}

.ending-message {
  font-size: 16px;
  color: var(--color-text-primary);
  line-height: 1.6;
  margin: 20px 0 24px;
}

/* ===================================================================
   인트로 / 챕터 인트로
=================================================================== */
.intro-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 60px 24px 40px;
}

.intro-logo {
  font-size: 36px;
  font-weight: 800;
  color: var(--color-text-primary);
  letter-spacing: -0.04em;
  margin-bottom: 8px;
}

.intro-subtitle {
  font-size: 14px;
  color: var(--color-text-secondary);
  margin-bottom: 40px;
  font-weight: 500;
}

.intro-illustration {
  font-size: 80px;
  margin: 20px 0 32px;
  line-height: 1;
}

/* 시나리오 카드 — 게임 설정 소개 */
.intro-scenario {
  width: 100%;
  background: linear-gradient(135deg, var(--color-primary-soft) 0%, #F0FDF4 100%);
  border: 1px solid var(--color-primary);
  border-radius: var(--radius-card);
  padding: 18px 20px;
  margin-bottom: 28px;
  text-align: left;
  box-shadow: 0 2px 8px rgba(34, 197, 94, 0.08);
}

.intro-scenario-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  color: var(--color-primary-dark);
  background: var(--color-bg);
  padding: 4px 10px;
  border-radius: var(--radius-pill);
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}

.intro-scenario-body {
  font-size: 15px;
  color: var(--color-text-primary);
  line-height: 1.65;
  letter-spacing: -0.01em;
}

.intro-scenario-body b {
  color: var(--color-primary-dark);
  font-weight: 700;
}

.intro-description {
  font-size: 15px;
  color: var(--color-text-primary);
  line-height: 1.7;
  margin-bottom: 32px;
}

.intro-features {
  text-align: left;
  width: 100%;
  margin-bottom: 32px;
}

.intro-feature {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--color-border-soft);
}

.intro-feature:last-child {
  border-bottom: none;
}

.intro-feature-icon {
  width: 36px;
  height: 36px;
  background: var(--color-primary-soft);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.intro-feature-text {
  font-size: 14px;
  color: var(--color-text-primary);
  line-height: 1.5;
  font-weight: 500;
}

.intro-feature-text .sub {
  display: block;
  font-size: 12px;
  font-weight: 400;
  color: var(--color-text-tertiary);
  margin-top: 2px;
}

/* 챕터 인트로 */
.chapter-intro {
  text-align: center;
  padding: 60px 20px 40px;
  animation: fadeInUp 0.5s ease-out;
}

.chapter-number {
  font-size: 13px;
  font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}

.chapter-title {
  font-size: 30px;
  font-weight: 800;
  color: var(--color-text-primary);
  letter-spacing: -0.03em;
  margin: 0 0 6px;
}

.chapter-period {
  font-size: 14px;
  color: var(--color-text-secondary);
  margin-bottom: 32px;
}

.chapter-emoji {
  font-size: 64px;
  margin: 16px 0 24px;
}

.chapter-description {
  font-size: 15px;
  color: var(--color-text-primary);
  line-height: 1.7;
  max-width: 320px;
  margin: 0 auto 32px;
}

/* ===================================================================
   토스트 / 알림
=================================================================== */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(25, 31, 40, 0.92);
  color: white;
  padding: 12px 20px;
  border-radius: var(--radius-button);
  font-size: 14px;
  font-weight: 600;
  z-index: 200;
  animation: toastSlide 0.3s ease-out;
  max-width: 380px;
  text-align: center;
}

@keyframes toastSlide {
  from { opacity: 0; transform: translate(-50%, 12px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

/* ===================================================================
   하단 모달 (시트)
=================================================================== */
.sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  z-index: 300;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: fadeIn 0.2s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.sheet {
  width: 100%;
  max-width: 420px;
  background: var(--color-bg);
  border-radius: 24px 24px 0 0;
  padding: 8px 20px 32px;
  max-height: 85vh;
  overflow-y: auto;
  animation: sheetUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes sheetUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.sheet-handle {
  width: 36px;
  height: 4px;
  background: var(--color-border);
  border-radius: 2px;
  margin: 6px auto 16px;
}

.sheet-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 12px;
  color: var(--color-text-primary);
}

/* 선택 결과 시트 색상 분기 */
.sheet.sheet-good {
  border-top: 4px solid var(--color-primary);
  background: linear-gradient(to bottom, #F0FDF4 0%, var(--color-bg) 100px);
}
.sheet.sheet-good .sheet-title {
  color: var(--color-primary-dark);
}
.sheet.sheet-warn {
  border-top: 4px solid var(--color-danger);
  background: linear-gradient(to bottom, #FEF2F2 0%, var(--color-bg) 100px);
}
.sheet.sheet-warn .sheet-title {
  color: var(--color-danger);
}
.sheet.sheet-good .card-flat {
  background: #ECFDF5;
  border: 1px solid #BBF7D0;
  border-radius: 12px;
}
.sheet.sheet-warn .card-flat {
  background: #FEF2F2;
  border: 1px solid #FECACA;
  border-radius: 12px;
}

/* 챕터 점프 시트 항목 */
.chapter-jump-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 12px;
  border: 1px solid var(--color-border);
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
  background: var(--color-bg);
}
.chapter-jump-item:active {
  background: var(--color-surface);
  transform: scale(0.99);
}
.chapter-jump-item.current {
  border-color: var(--color-primary);
  background: var(--color-primary-soft);
}
.chapter-jump-icon {
  font-size: 24px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--color-surface-2);
  border-radius: 10px;
  flex-shrink: 0;
}
.chapter-jump-item.current .chapter-jump-icon {
  background: var(--color-bg);
}
.chapter-jump-body {
  flex: 1;
  min-width: 0;
}
.chapter-jump-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin-bottom: 2px;
}
.chapter-jump-now {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  color: var(--color-primary-dark);
  background: var(--color-bg);
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: 4px;
  vertical-align: middle;
}
.chapter-jump-desc {
  font-size: 12px;
  color: var(--color-text-tertiary);
}
.chapter-jump-arrow {
  color: var(--color-text-tertiary);
  font-size: 16px;
  flex-shrink: 0;
}

/* ===================================================================
   유틸리티
=================================================================== */
.text-center { text-align: center; }
.text-secondary { color: var(--color-text-secondary); }
.text-tertiary { color: var(--color-text-tertiary); }
.text-primary-color { color: var(--color-primary-dark); }
.text-warn { color: var(--color-warning-strong); }
.text-danger { color: var(--color-danger); }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.mt-20 { margin-top: 20px; }
.mt-24 { margin-top: 24px; }
.mb-8 { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }
.mb-16 { margin-bottom: 16px; }
.font-bold { font-weight: 700; }
.font-semibold { font-weight: 600; }
.text-sm { font-size: 13px; }
.text-xs { font-size: 12px; }

/* 결과 카드 */
.result-card {
  background: var(--color-primary-soft);
  border-radius: var(--radius-card);
  padding: 20px;
  margin-bottom: 16px;
  text-align: center;
}

.result-card.warn {
  background: var(--color-warning-bg);
}

.result-card.danger {
  background: var(--color-danger-bg);
}

.result-card.info {
  background: var(--color-info-bg);
}

.result-emoji {
  font-size: 40px;
  margin-bottom: 8px;
}

.result-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin-bottom: 6px;
}

.result-description {
  font-size: 14px;
  color: var(--color-text-secondary);
  line-height: 1.55;
}

/* 미션 큐 (이사 당일) */
.mission-current {
  background: var(--color-text-primary);
  color: white;
  border-radius: var(--radius-card);
  padding: 20px;
  margin-bottom: 12px;
}

.mission-current .mission-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}

.mission-current .mission-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}

.mission-current .mission-desc {
  font-size: 14px;
  color: rgba(255,255,255,0.75);
  line-height: 1.5;
}

.mission-upcoming {
  background: var(--color-surface);
  border-radius: var(--radius-card);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.mission-upcoming-time {
  font-size: 13px;
  font-weight: 700;
  color: var(--color-text-tertiary);
  width: 50px;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

.mission-upcoming-text {
  font-size: 14px;
  color: var(--color-text-secondary);
  font-weight: 500;
}

.mission-done {
  background: var(--color-primary-soft);
  color: var(--color-primary-dark);
  border-radius: var(--radius-card);
  padding: 12px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-weight: 600;
}

.mission-done::before {
  content: '✓';
  font-weight: 800;
}

/* 카운트 박스 (예산 표시 등) */
.metric-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}

.metric-card {
  background: var(--color-surface);
  border-radius: var(--radius-card);
  padding: 14px 16px;
}

.metric-label {
  font-size: 12px;
  color: var(--color-text-tertiary);
  font-weight: 600;
  margin-bottom: 4px;
}

.metric-value {
  font-size: 20px;
  font-weight: 800;
  color: var(--color-text-primary);
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}

.metric-value .unit {
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text-tertiary);
  margin-left: 2px;
}

/* ===================================================================
   설정 메뉴
=================================================================== */
.settings-button {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--color-surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  z-index: 110;
}

.settings-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.settings-item {
  padding: 16px;
  background: var(--color-surface);
  border-radius: var(--radius-button);
  font-size: 15px;
  font-weight: 600;
  text-align: left;
  width: 100%;
}

.settings-item.danger {
  color: var(--color-danger);
}

/* ===================================================================
   매물 상세 모달
=================================================================== */
.detail-section-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin: 16px 0 8px;
}

.spec-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin-bottom: 12px;
}

.spec-item {
  display: flex;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--color-surface);
  border-radius: var(--radius-chip);
  font-size: 13px;
}

.spec-label {
  color: var(--color-text-tertiary);
  font-weight: 500;
}

.spec-value {
  color: var(--color-text-primary);
  font-weight: 700;
}

/* 매물 방문 체크 */
.visit-check {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  background: var(--color-surface);
  border-radius: var(--radius-button);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.visit-check:active {
  transform: scale(0.99);
}

.visit-check-icon {
  width: 32px;
  height: 32px;
  background: var(--color-bg);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.visit-check-content {
  flex: 1;
}

.visit-check-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin-bottom: 2px;
}

.visit-check-result {
  font-size: 12px;
  color: var(--color-text-secondary);
  font-weight: 500;
  line-height: 1.4;
}

.visit-check.checked {
  background: var(--color-primary-soft);
}

.visit-check.checked .visit-check-icon {
  background: var(--color-primary);
  color: white;
}

.visit-check.problem {
  background: var(--color-warning-bg);
}

.visit-check.problem .visit-check-icon {
  background: var(--color-warning-strong);
  color: white;
}

/* 안전 영역 */
@supports (padding: max(0px)) {
  .bottom-cta {
    padding-bottom: max(28px, env(safe-area-inset-bottom));
  }
}

/* 데스크탑 안내 */
.desktop-hint {
  display: none;
  text-align: center;
  padding: 8px;
  font-size: 11px;
  color: var(--color-text-tertiary);
  background: var(--color-surface);
}

@media (min-width: 600px) {
  body {
    padding-top: 20px;
  }
  #app {
    border-radius: 24px;
    overflow: hidden;
    min-height: calc(100vh - 40px);
  }
  .desktop-hint {
    display: block;
  }
}

/* ===================================================================
   예산 입력 폼 (ch1_budget)
=================================================================== */
.budget-input-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--color-surface);
  border: 2px solid var(--color-border);
  border-radius: var(--radius-button);
  padding: 14px 16px;
  margin-top: 4px;
  transition: border-color 0.15s ease;
}

.budget-input-wrap:focus-within {
  border-color: var(--color-primary);
  background: var(--color-bg);
}

.budget-input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: inherit;
  font-size: 22px;
  font-weight: 700;
  color: var(--color-text-primary);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
  text-align: right;
  width: 100%;
  min-width: 0;
  -moz-appearance: textfield;
}

.budget-input::-webkit-outer-spin-button,
.budget-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.budget-input-unit {
  font-size: 16px;
  font-weight: 600;
  color: var(--color-text-secondary);
  flex-shrink: 0;
}

.budget-preview {
  margin-top: 12px;
  text-align: right;
  font-size: 14px;
  font-weight: 600;
  color: var(--color-primary-dark);
  min-height: 20px;
}

.quick-btn {
  padding: 8px 14px;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text-secondary);
  transition: all 0.15s ease;
}

.quick-btn:active {
  background: var(--color-primary-soft);
  color: var(--color-primary-dark);
  border-color: var(--color-primary);
  transform: scale(0.97);
}

/* ===================================================================
   빠른 입력 버튼 컨테이너 (예산 입력 카드 내부)
=================================================================== */
.quick-budget-wrap {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px dashed var(--color-border);
}

.quick-budget-label {
  font-size: 13px;
  color: var(--color-text-secondary);
  margin-bottom: 10px;
  font-weight: 500;
}

.quick-budget-buttons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ===================================================================
   처음으로 돌아가기 버튼 (헤더)
=================================================================== */
.header-top-left {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
}

.header-top-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.home-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px;
  background: var(--color-surface-2);
  color: var(--color-text-secondary);
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--radius-pill);
  transition: all 0.15s ease;
  letter-spacing: -0.02em;
}

.home-btn:active {
  background: var(--color-danger-bg);
  color: var(--color-danger);
  transform: scale(0.96);
}

.home-btn-icon {
  font-size: 13px;
  line-height: 1;
}

.home-btn-text {
  line-height: 1;
}

/* ===================================================================
   보관함 버튼 (헤더 우측) & 시트 내부
=================================================================== */
.locker-btn {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 10px 5px 9px;
  background: var(--color-primary-soft);
  color: var(--color-primary-dark);
  font-size: 11px;
  font-weight: 700;
  border-radius: var(--radius-pill);
  transition: all 0.15s ease;
  letter-spacing: -0.02em;
}
.locker-btn:active {
  background: var(--color-primary);
  color: #fff;
  transform: scale(0.96);
}
.locker-btn-icon { font-size: 13px; line-height: 1; }
.locker-btn-text { line-height: 1; }
.locker-btn-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 16px;
  height: 16px;
  padding: 0 4px;
  margin-left: 2px;
  background: var(--color-primary);
  color: #fff;
  font-size: 10px;
  font-weight: 800;
  border-radius: 999px;
  font-variant-numeric: tabular-nums;
}

/* 학습/팁 박스에 부착되는 액션 버튼들 */
.bookmark-actions {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed rgba(0,0,0,0.06);
}
.bookmark-action-btn {
  flex: 1;
  padding: 8px 10px;
  background: rgba(255,255,255,0.7);
  color: var(--color-text-secondary);
  font-size: 12px;
  font-weight: 600;
  border-radius: var(--radius-button);
  border: 1px solid var(--color-border);
  transition: all 0.15s ease;
  letter-spacing: -0.02em;
  white-space: nowrap;
}
.bookmark-action-btn:active {
  background: var(--color-primary-soft);
  color: var(--color-primary-dark);
  border-color: var(--color-primary);
  transform: scale(0.98);
}
.danger-box .bookmark-actions,
.warn-box .bookmark-actions {
  border-top-color: rgba(0,0,0,0.08);
}

/* 보관함 시트 */
.sheet-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 4px 0 14px;
}
.sheet-title {
  font-size: 17px;
  font-weight: 800;

<body>
<div id="app">
  <div class="desktop-hint">📱 모바일 화면 기준으로 최적화된 게임입니다</div>
  <div id="game-root"></div>
</div>

<script>
/* ===================================================================
   GAME ENGINE — 게임 엔진 코어
   첫 이사 (First Move) — v1.0
=================================================================== */

// 게임 상태
let state = {
  scene: 'intro',          // 현재 화면 ID
  chapter: 0,              // 0=인트로, 1~6=챕터
  budget: 0,               // 예산 (원) — 사용자 입력으로 초기화
  initialBudget: 0,        // 초기 입력 예산 (참조용)
  stress: 30,              // 스트레스 0~100
  dday: -30,               // D-Day
  knowledge: 0,            // 학습 포인트
  checklist: {},           // 체크리스트 완료 상태
  flags: {},               // 진행 플래그 (선택 기록, 분기 등)
  visited: {},             // 방문한 매물 체크 상태
  chosenListing: null,     // 선택한 매물
  scoreLog: [],            // 최종 평가용 로그
  ch5MissionIdx: 0,        // 챕터 5 미션 인덱스
  ch6DayIdx: 0,            // 챕터 6 일자 인덱스
  sceneHistory: [],        // 화면 방문 기록 스택 (뒤로가기용)
  bookmarks: [],           // 보관함: 저장한 학습/팁 [{id, title, body, chapter, savedAt}]
  todos: [],               // 보관함: 할 일 [{id, text, done, chapter, savedAt}]
  wrongChoiceLog: [],      // 오답노트: 아쉬운 선택 기록 [{chapter, title, desc, picked, correctAnswer, explanation}]
};

// 저장 키
const SAVE_KEY = 'firstmove_save_v1';

function saveGame() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  } catch(e) { /* localStorage 불가 환경 무시 */ }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const loaded = JSON.parse(raw);
      state = { ...state, ...loaded };
      // 이전 버전 세이브에 없던 필드 기본값 보장
      if (!Array.isArray(state.bookmarks)) state.bookmarks = [];
      if (!Array.isArray(state.todos)) state.todos = [];
      if (!Array.isArray(state.wrongChoiceLog)) state.wrongChoiceLog = [];
      return true;
    }
  } catch(e) {}
  return false;
}

function resetGame() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
  state = {
    scene: 'intro', chapter: 0,
    budget: 0, initialBudget: 0, stress: 30,
    dday: -30, knowledge: 0,
    checklist: {}, flags: {}, visited: {},
    chosenListing: null, scoreLog: [],
    ch5MissionIdx: 0, ch6DayIdx: 0,
    sceneHistory: [],
    bookmarks: [], todos: [], wrongChoiceLog: [],
  };
  render();
}

// 유틸: 금액 표시 (1억 5000만)
function fmtMoney(won) {
  if (won >= 100_000_000) {
    const eok = Math.floor(won / 100_000_000);
    const man = Math.floor((won % 100_000_000) / 10_000);
    if (man === 0) return `${eok}억`;
    return `${eok}억 ${man.toLocaleString()}만`;
  }
  if (won >= 10_000) {
    const man = Math.floor(won / 10_000);
    return `${man.toLocaleString()}만`;
  }
  return won.toLocaleString() + '원';
}

// 체크리스트 추가
function checkOff(id) {
  if (!state.checklist[id]) {
    state.checklist[id] = true;
    state.knowledge += 1;
    saveGame();
  }
}

// 자원 변동
function modifyBudget(delta) { state.budget += delta; saveGame(); }
function modifyStress(delta) {
  state.stress = Math.max(0, Math.min(100, state.stress + delta));
  saveGame();
}
function setDay(d) { state.dday = d; saveGame(); }

// 토스트
function showToast(msg, duration = 2000) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), duration);
}

// 시트 (하단 모달)
function openSheet(html, variant) {
  // variant: 'good' | 'warn' | undefined(기본)
  const variantClass = variant === 'good' ? ' sheet-good'
                     : variant === 'warn' ? ' sheet-warn'
                     : '';
  const overlay = document.createElement('div');
  overlay.className = 'sheet-overlay';
  overlay.innerHTML = `
    <div class="sheet${variantClass}" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      ${html}
    </div>
  `;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
  return overlay;
}

function closeSheet() {
  document.querySelectorAll('.sheet-overlay').forEach(o => o.remove());
}

// 화면 이동 — 방문 기록 스택에 현재 화면 push
function go(scene) {
  // 동일 화면 재진입은 history에 안 쌓음 (불필요한 중복 방지)
  if (state.scene !== scene) {
    if (!state.sceneHistory) state.sceneHistory = [];
    state.sceneHistory.push(state.scene);
    // 너무 길어지면 앞부분 잘라냄 (메모리 보호)
    if (state.sceneHistory.length > 50) {
      state.sceneHistory = state.sceneHistory.slice(-50);
    }
  }
  state.scene = scene;
  saveGame();
  render();
  scrollToTop();
}

// 뒤로가기 — history 스택에서 pop
function goBack() {
  if (!state.sceneHistory || state.sceneHistory.length === 0) {
    showToast('더 이상 뒤로 갈 수 없어요');
    return;
  }
  const prevScene = state.sceneHistory.pop();
  state.scene = prevScene;
  saveGame();
  render();
  scrollToTop();
}

// 화면 최상단으로 강제 스크롤 (iOS Safari 포함 모든 브라우저 호환)
function scrollToTop() {
  // requestAnimationFrame을 사용해 DOM 렌더링 후 스크롤 보장
  requestAnimationFrame(() => {
    window.scrollTo(0, 0);
    if (document.documentElement) document.documentElement.scrollTop = 0;
    if (document.body) document.body.scrollTop = 0;
  });
}

/* ===================================================================
   보관함 (Bookmarks / Todos) & 오답노트
=================================================================== */

// 학습/팁 저장 (책갈피 모드)
function saveBookmark(title, body) {
  if (!Array.isArray(state.bookmarks)) state.bookmarks = [];
  // 같은 title+body 중복 방지
  const dup = state.bookmarks.find(b => b.title === title && b.body === body);
  if (dup) { showToast('이미 보관함에 있어요'); return; }
  state.bookmarks.unshift({
    id: 'bm_' + Date.now() + '_' + Math.floor(Math.random() * 1000),
    title: String(title || '').slice(0, 200),
    body: String(body || '').slice(0, 2000),
    chapter: state.chapter,
    savedAt: Date.now(),
  });
  saveGame();
  showToast('📌 보관함에 저장했어요');
  // 보관함 버튼이 화면에 있으면 카운트 갱신
  updateLockerBadge();
}

// 할 일 추가 (투두 모드)
function addTodo(text, fromChapter) {
  if (!Array.isArray(state.todos)) state.todos = [];
  const t = String(text || '').trim();
  if (!t) return;
  if (t.length > 200) { showToast('200자 이내로 적어주세요'); return; }
  state.todos.unshift({
    id: 'td_' + Date.now() + '_' + Math.floor(Math.random() * 1000),
    text: t,
    done: false,
    chapter: fromChapter != null ? fromChapter : state.chapter,
    savedAt: Date.now(),
  });
  saveGame();
  updateLockerBadge();
}

function toggleTodo(id) {
  const t = (state.todos || []).find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  saveGame();
  renderLockerSheet(); // 시트 내부만 다시 그림
}

function removeTodo(id) {
  state.todos = (state.todos || []).filter(x => x.id !== id);
  saveGame();
  renderLockerSheet();
  updateLockerBadge();
}

function removeBookmark(id) {
  state.bookmarks = (state.bookmarks || []).filter(x => x.id !== id);
  saveGame();
  renderLockerSheet();
  updateLockerBadge();
}

function clearDoneTodos() {
  const before = (state.todos || []).length;
  state.todos = (state.todos || []).filter(x => !x.done);
  saveGame();
  renderLockerSheet();
  updateLockerBadge();
  if (before !== state.todos.length) showToast('완료한 할 일을 비웠어요');
}

// 헤더의 보관함 버튼 뱃지 (개수) 갱신
function updateLockerBadge() {
  const el = document.getElementById('lockerBadge');
  if (!el) return;
  const count = (state.bookmarks || []).length + (state.todos || []).filter(t => !t.done).length;
  if (count > 0) {
    el.textContent = count > 99 ? '99+' : String(count);
    el.style.display = '';
  } else {
    el.style.display = 'none';
  }
}

// 보관함 시트 열기 — 탭(보관함/할 일) 구조
let _lockerTab = 'bookmarks'; // 'bookmarks' | 'todos'
let _todoDraft = '';

function openLockerSheet(tab) {
  if (tab) _lockerTab = tab;
  openSheet(renderLockerHTML());
  // 입력칸 포커스(투두 탭일 때만)
  setTimeout(() => {
    const inp = document.getElementById('todoInput');
    if (inp && _lockerTab === 'todos') inp.focus();
  }, 200);
}

// 시트 내부만 다시 그리기 (입력값 보존)
function renderLockerSheet() {
  const sheet = document.querySelector('.sheet-overlay .sheet');
  if (!sheet) return;
  // 현재 드래프트 보존
  const inp = document.getElementById('todoInput');
  if (inp) _todoDraft = inp.value;
  sheet.innerHTML = `<div class="sheet-handle"></div>` + renderLockerHTML(true);
  // 포커스/값 복구
  const inp2 = document.getElementById('todoInput');
  if (inp2 && _lockerTab === 'todos') {
    inp2.value = _todoDraft;
    inp2.focus();
    // 커서 끝으로
    inp2.setSelectionRange(inp2.value.length, inp2.value.length);
  }
}

function switchLockerTab(tab) {
  _lockerTab = tab;
  // 탭 전환 시 드래프트 초기화하지 않음
  renderLockerSheet();
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function chapterTag(n) {
  if (!n || n < 1) return '';
  return `<span class="locker-chip">CH ${n}</span>`;
}

function renderLockerHTML(_inner) {
  const bms = state.bookmarks || [];
  const todos = state.todos || [];
  const undone = todos.filter(t => !t.done).length;

function renderTodoItem(t) {
  return `
    <div class="locker-todo ${t.done ? 'done' : ''}">

  `;
}

function submitTodo() {
  const inp = document.getElementById('todoInput');
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) { inp.focus(); return; }
  addTodo(val);
  _todoDraft = '';
  renderLockerSheet();
}

/* --- 학습박스 옆에 부착하는 액션 버튼 (보관/할일) --- */
// 학습 본문에 HTML이 들어있으니, JSON으로 안전하게 인라인 전달하기 위해 base64 인코딩
function encodeForCall(s) {
  try { return btoa(unescape(encodeURIComponent(String(s == null ? '' : s)))); }
  catch (e) { return ''; }
}
function decodeFromCall(s) {
  try { return decodeURIComponent(escape(atob(s))); }
  catch (e) { return ''; }
}

function saveBookmarkB64(titleB64, bodyB64) {
  saveBookmark(decodeFromCall(titleB64), decodeFromCall(bodyB64));
}

function quickAddTodoFromTip(textB64) {
  const text = decodeFromCall(textB64);
  if (!text) return;
  addTodo(text);
  showToast('✓ 할 일에 추가했어요');
}

// 학습/팁 박스에 붙는 액션 버튼 HTML 생성 헬퍼
// title, body: 보관함에 저장될 텍스트/HTML
// todoText: (선택) "+ 할 일" 버튼으로 바로 추가할 한 줄 텍스트. 없으면 버튼 숨김
function bookmarkActions(title, body, todoText) {
  const tB64 = encodeForCall(title);
  const bB64 = encodeForCall(body);
  const todoB64 = todoText ? encodeForCall(todoText) : '';
  return `
    <div class="bookmark-actions">
      <button class="bookmark-action-btn" onclick="saveBookmarkB64('${tB64}','${bB64}')">
        📌 보관함에 저장
      </button>
      ${todoText ? `
        <button class="bookmark-action-btn" onclick="quickAddTodoFromTip('${todoB64}')">
          + 할 일
        </button>
      ` : ''}
    </div>
  `;
}

  state.wrongChoiceLog.push({

    desc: entry.desc || '',
    picked: entry.picked || '',
    correctAnswer: entry.correctAnswer || '',
    explanation: entry.explanation || '',
    savedAt: Date.now(),
  });
  saveGame();
}

// 모든 .learn-box / .warn-box / .danger-box에 보관 버튼 자동 주입
function injectBookmarkButtons(scope) {
  const boxes = scope.querySelectorAll('.learn-box, .warn-box, .danger-box');
  boxes.forEach(box => {
    // 이미 부착돼 있으면 스킵
    if (box.querySelector(':scope > .bookmark-actions')) return;
    // 매물 영역 안의 작은 알림 등은 본문이 비어있을 수 있음 — 안전 처리
    const headerEl = box.querySelector(
      '.learn-box-header, .warn-box-header, .danger-box-header'
    );
    const contentEl = box.querySelector(
      '.learn-box-content, .warn-box-content, .danger-box-content'
    );
    if (!headerEl && !contentEl) return;

    const title = (headerEl ? headerEl.textContent : '메모').trim();
    // 본문은 HTML 보존 (b, br 등 살아있어야 보관함에서도 자연스러움)
    const body = contentEl ? contentEl.innerHTML.trim() : '';
    if (!body) return;

    // todo 한 줄 텍스트: 본문 텍스트 첫 문장
    const plain = contentEl ? contentEl.textContent.replace(/\s+/g, ' ').trim() : '';
    // 첫 마침표/물음표/느낌표까지, 너무 짧으면 60자까지
    let todoLine = '';
    const m = plain.match(/^([^.?!\n]{4,80}[.?!])/);
    if (m) todoLine = m[1];
    else if (plain.length > 0) todoLine = plain.slice(0, 60) + (plain.length > 60 ? '…' : '');
    // todo는 짧고 행동형일 때만 의미 있음 — 어쨌든 사용자 편집 가능하니 일단 제공
    const todoText = todoLine ? `[CH${state.chapter}] ${todoLine}` : '';

    const wrap = document.createElement('div');
    wrap.innerHTML = bookmarkActions(title, body, todoText);
    box.appendChild(wrap.firstElementChild);
  });
}

function startGame() {
  // 저장된 게임이 있으면 묻기
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.chapter > 0) {
        if (confirm('이어서 플레이할까요?\n취소하면 처음부터 다시 시작합니다.')) {
          loadGame();
          render();
          return;
        } else {
          resetGame();
        }
      }
    }
  } catch(e) {}
  enterChapter(1, 'ch1_intro');
  // 보관함 사용 안내 — 한 게임당 1번만
  if (!state.flags.lockerHintShown) {
    state.flags.lockerHintShown = true;
    saveGame();
    setTimeout(() => {
      showToast('📌 학습 박스 아래 버튼으로 보관함에 저장할 수 있어요', 3500);
    }, 1500);
  }
}

/* ===================================================================
   숫자 입력 보조 — 만원 단위 입력 받기
=================================================================== */
function parseManToWon(str) {
  // "15000" (만원) → 150_000_000 (원)
  if (!str) return 0;
  const n = parseInt(String(str).replace(/[^0-9]/g, ''), 10);
  if (isNaN(n)) return 0;
  return n * 10_000;
}

  const won = parseManToWon(input.value);
  if (won < 1_000_000) {
    showToast('100만원 이상 입력해주세요');
    return;
  }
  state.budget = won;
  state.initialBudget = won;
  saveGame();
  go('ch1_jeonse_vs_wolse');
}

// 매물 리스트 — 전세/월세 선택에 따라 필터링

/* -------------------------------------------------------------------
   [HELPER] 매물 카드 공통 헬퍼
   ▶ getListingArea: 등기부 표제부에서 면적(㎡) 추출 + 평수 계산
   ▶ getListingVisitStatus: 매물의 방문 상태(낮/밤/등기부) 반환
------------------------------------------------------------------- */
function getListingArea(L) {
  // L.iros.head.detail에서 "XX.X㎡" 패턴 추출
  if (!L || !L.iros || !L.iros.head || !L.iros.head.detail) return null;
  const match = L.iros.head.detail.match(/(\d+(?:\.\d+)?)\s*㎡/);
  if (!match) return null;
  const sqm = parseFloat(match[1]);
  const pyeong = (sqm / 3.3058).toFixed(1);
  return { sqm, pyeong };
}

function getListingVisitStatus(L) {
  // 3가지 모드 각각 완료(completeVisit) 여부 → state.flags.visited_<id>_<mode>
  const id = L.id;
  return {

/* -------------------------------------------------------------------
   [HELPER] 매물 자금 적정성 판단
   ─────────────────────────────────────────────
   사용자 가용 자금 + 최대 대출 한도 vs 필요 보증금 비교
   ▶ affordable: 충분히 감당 가능
   ▶ tight:     대출까지 끌어모아야 빠듯
   ▶ overReach: 대출 끌어모아도 부족
------------------------------------------------------------------- */
function getMaxLoanForListing(L) {
  if (!L || L.type !== 'jeonse') return 0;
  // 매물별 시세 추정 (대출 화면과 동일)
  const marketValueMap = {
    J1: 300_000_000, J2: 190_000_000, J3: 350_000_000, J4: 240_000_000,
  };
  const marketValue = marketValueMap[L.id] || Math.floor(L.deposit * 1.6);
  // 청년이 받을 수 있는 최대 한도: 버팀목 1.2억 vs 일반 시세80% 중 큰 것
  // 깡통/불법 매물은 대출 불가
  if (L.danger) return 0;
  return Math.max(120_000_000, Math.floor(marketValue * 0.8));
}

function checkAffordability(L) {
  if (!L) return { status: 'affordable' };
  const myFund = state.budget || 0;
  if (L.type === 'wolse') {
    // 월세는 보증금만 감당하면 됨
    if (myFund >= L.deposit) return { status: 'affordable' };
    return { status: 'overReach', shortage: L.deposit - myFund };
  }
  // 전세
  const maxLoan = getMaxLoanForListing(L);
  const totalAvailable = myFund + maxLoan;
  if (totalAvailable >= L.deposit) {
    // 대출 비중이 크면 빠듯
    const loanNeeded = Math.max(0, L.deposit - myFund);
    if (loanNeeded > maxLoan * 0.9) return { status: 'tight', loanNeeded, maxLoan };
    return { status: 'affordable' };
  }
  return { status: 'overReach', shortage: L.deposit - totalAvailable, maxLoan };
}

function renderAffordabilityBadge(L) {
  const a = checkAffordability(L);
  if (a.status === 'affordable') return '';
  if (a.status === 'tight') {
    return `<div style="margin-top:8px;padding:6px 10px;background:#fff8e1;color:#8a6d00;border-radius:6px;font-size:12px">
      ⚠ 대출까지 끌어모아야 빠듯해요
    </div>`;
  }
  // overReach
  return `<div style="margin-top:8px;padding:6px 10px;background:#fff0f0;color:#c92a2a;border-radius:6px;font-size:12px">
    🚫 가용 자금 + 대출로도 부족 (${a.shortage ? fmtMoney(a.shortage) + ' 부족' : '자금 조달 불가'})
  </div>`;
}

function checkVisitItem(id, key, isProblem, learnTopic) {
  if (!state.visited[id]) state.visited[id] = {};

  state.knowledge += 1;
  saveGame();

  if (learnTopic === 'illegal') {

function completeVisit(key) {
  if (!state.flags[key]) {
    state.flags[key] = true;
    state.flags.ch1VisitedCount = (state.flags.ch1VisitedCount || 0) + 1;
    modifyStress(5);
    saveGame();
  }

}

function chooseListing(id) {
  const L = LISTINGS.find(l => l.id === id);

  // 1) 자금 부족 매물 경고 (overReach)
  const afford = checkAffordability(L);
  if (afford.status === 'overReach') {
    const recommend = L.type === 'jeonse'
      ? '<br/><br/>💡 보증금이 부족할 땐 <b>월세 매물</b>을 추천드려요. 보증금이 작아 자금 부담이 훨씬 적어요.'
      : '';
    openSheet(`
      <div class="sheet-title">🚫 자금 부족</div>
      <div class="card-flat">
        <div class="card-body">
          <b>${L.title}</b>은 보증금이 <b>${fmtMoney(L.deposit)}</b>이에요.<br/><br/>
          현재 가용 자금 <b>${fmtMoney(state.budget)}</b>
          ${L.type === 'jeonse' && afford.maxLoan ? `+ 최대 대출 한도 <b>${fmtMoney(afford.maxLoan)}</b>` : ''}
          로도 <b>${fmtMoney(afford.shortage)}</b>이 부족해요.<br/><br/>
          이 매물을 강행하면 잔금일에 송금할 수 없어 계약이 깨져요.
          ${recommend}
        </div>
      </div>
      <div class="choices mt-16">
        ${L.type === 'jeonse' ? `
          <button class="choice-btn recommended" onclick="closeSheet(); switchToWolse()">
            <span>🏠 월세 매물로 보러 가기</span><span class="arrow">→</span>
          </button>
        ` : ''}
        <button class="choice-btn" onclick="closeSheet()">
          <span>다른 매물 다시 보기</span><span class="arrow">→</span>
        </button>
      </div>
    `);
    return;
  }

  // 2) 빠듯한 매물 안내 (tight) — 강행은 가능하나 경고
  if (afford.status === 'tight') {
    openSheet(`
      <div class="sheet-title">⚠ 자금이 빠듯해요</div>
      <div class="card-flat">
        <div class="card-body">
          <b>${L.title}</b>은 본인 자금 + 대출을 거의 최대로 끌어모아야 감당돼요.<br/><br/>
          • 보증금: <b>${fmtMoney(L.deposit)}</b><br/>
          • 본인 자금: <b>${fmtMoney(state.budget)}</b><br/>
          • 필요 대출: <b>${fmtMoney(afford.loanNeeded)}</b> (최대 한도 ${fmtMoney(afford.maxLoan)})<br/><br/>
          대출 심사가 깐깐하게 나오면 한도가 줄어 송금이 어려울 수도 있어요.
        </div>
      </div>
      <div class="choices mt-16">
        <button class="choice-btn recommended" onclick="closeSheet()">
          <span>다시 생각해볼게요</span><span class="arrow">→</span>
        </button>
        <button class="choice-btn" onclick="closeSheet(); chooseListingDangerCheck('${id}')">
          <span>그래도 이 매물로 진행</span><span class="arrow">→</span>
        </button>
      </div>
    `);
    return;
  }

  // 3) 위험 매물(깡통/불법) 경고
  chooseListingDangerCheck(id);
}

function switchToWolse() {
  state.flags.rentType = 'wolse';
  state.flags.ch1VisitedCount = 0;
  saveGame();
  go('ch1_listings');
}

function chooseListingDangerCheck(id) {

}

function confirmChoice(id) {
  state.chosenListing = id;
  checkOff('listing_chosen');

  go('ch1_pre_deposit');
}

// 보증금 구간별 가계약금 매칭
function getPreDeposit(deposit) {
  if (deposit < 50_000_000)        return 500_000;     // 5천만 미만 (월세형)
  if (deposit < 100_000_000)       return 1_000_000;   // 5천~1억
  if (deposit < 300_000_000)       return 3_000_000;   // 1억~3억
  return 5_000_000;                                    // 3억 이상
}

function sendPreDeposit(amount) {

function placeStamp(who) {
  if (!state.flags.stamps) state.flags.stamps = {};
  if (state.flags.stamps[who]) return;
  state.flags.stamps[who] = true;
  state.knowledge += 1;
  saveGame();
  // 짧은 토스트 + 진동(있으면)
  const labels = { landlord: '임대인', tenant: '임차인', agent: '공인중개사' };
  showToast(`도장 팍! ${labels[who]} 직인 완료`, 900);
  if (navigator.vibrate) { try { navigator.vibrate(30); } catch(e){} }
  render();
  // 페이퍼 흔들림 효과
  setTimeout(() => {
    const paper = document.getElementById('contractPaper');
    if (paper) {
      paper.classList.add('stamp-shake');
      setTimeout(() => paper.classList.remove('stamp-shake'), 300);
    }
  }, 50);
}

function finishSigning() {
  checkOff('contract_signed');
  go('ch2_deposit');
}

function chooseLoan(type) {
  const L = LISTINGS.find(l => l.id === state.chosenListing);
  // 매물별 시세 추정 (J1=3.0억, J2=1.9억, J3=3.5억, J4=2.4억)
  const marketValueMap = {
    J1: 300_000_000,
    J2: 190_000_000,
    J3: 350_000_000,
    J4: 240_000_000,
  };
  const marketValue = (L && marketValueMap[L.id]) || (L ? Math.floor(L.deposit * 1.6) : 300_000_000);

  // 실제 한도 (정책 한도와 매물 잔금 중 작은 값)
  const balance = L ? Math.floor(L.deposit * 0.9) : 100_000_000;
  const limits = {
    beotim:  Math.min(120_000_000, balance),                          // 버팀목 = 최대 1.2억
    jungso:  Math.min(100_000_000, balance),                          // 중소기업 = 최대 1억
    regular: Math.min(Math.floor(marketValue * 0.8), balance),        // 일반 = 시세의 80%
  };

  const productNames = {
    beotim:  '버팀목 전세대출',
    jungso:  '중소기업 청년 전세대출',
    regular: '일반 전세대출',
  };

  const productNotes = {
    beotim:  '소득·자산 기준 충족 시 한도 내 가능. 청년·신혼 가구는 우대금리 적용돼요.',
    jungso:  '중소기업 재직 + 만 34세 이하 등 자격 요건 충족 시 한도 1억까지 가능. 1.5% 초저금리.',
    regular: '주택 시세의 80%까지 가능하지만, 실제로는 신용·소득에 따라 70% 수준으로 깎이는 경우가 많아요.',
  };

  openSheet(`
    <div class="sheet-title">📌 대출 한도 안내</div>
    <div class="card-flat">
      <div class="card-body">
        <b>${productNames[type]}</b> 선택 시 이 매물 기준 대출 가능 금액은
        <b style="color:var(--color-primary,#1aab44)">${fmtMoney(limits[type])}</b> 이에요.<br/><br/>
        대출은 <b>꼭 무조건 100%</b>가 나오는 게 아니라,
        상품과 조건(시세·소득·신용·LTV 등)에 따라
        <b>보통 70~80% 수준</b>이 기본인 경우가 많아요.<br/><br/>
        <span style="font-size:13px;color:var(--color-text-secondary,#666)">${productNotes[type]}</span>
      </div>
    </div>
    <button class="cta-button mt-16" onclick="closeSheet(); confirmLoan('${type}', ${limits[type]})">
      이 조건으로 진행
    </button>
  `);
}

function confirmLoan(type, amount) {
  state.flags.loanType = type;
  // 대출금은 임차인 계좌로 들어오지 않음. 잔금일에 은행이 임대인에게 직접 송금.
  // 따라서 자금(budget)에는 더하지 않음.
  checkOff('loan_chosen');
  checkOff('loan_approved');
  state.flags.loanAmount = amount;
  saveGame();
  showToast(`✓ ${fmtMoney(amount)} 대출 승인 (잔금일에 임대인에게 직접 송금됨)`);
  setTimeout(() => go('ch2_summary'), 800);
}

function reselectListingAfterLoanFail(downpayment) {
  // 계약금 10%는 이미 송금되었으므로 차감 (계약금 송금이 이미 일어났다고 가정)
  // budget은 변경하지 않음 (계약금은 이미 sendDeposit에서 차감됐을 수 있음)
  // 다만 사용자에게 손실로 인식시키기 위한 알림과 패널티 플래그 설정
  openSheet(`
    <div class="sheet-title">⚠ 계약금 ${fmtMoney(downpayment)} 포기</div>
    <div class="card-flat">
      <div class="card-body">
        임차인 사유로 계약을 해지하면 <b>계약금은 돌려받지 못해요</b>.<br/><br/>
        지금까지 진행한 챕터 2(계약·대출) 내용을 초기화하고,
        다시 챕터 1의 매물 목록으로 돌아가요.<br/><br/>
        <b>이번엔 보증보험 가입이 가능한 안전 매물을 선택해보세요.</b>
      </div>
    </div>
    <div class="learn-box mt-16">
      <div class="learn-box-header">📚 실전에서는</div>
      <div class="learn-box-content">
        실제로도 계약 후 자금 조달이 막혀 계약금을 날리는 사례가 많아요.
        <b>도장 찍기 전</b>에 보증보험 가입 가능 여부·대출 한도를
        미리 확인하는 게 가장 중요해요.
      </div>
    </div>
    <button class="cta-button mt-16" onclick="closeSheet(); doReselectListing()">
      매물 다시 선택하러 가기
    </button>
  `);
}

function doReselectListing() {
  // 챕터 2에서 진행한 항목 초기화
  state.flags.insurance = false;
  state.flags.insuranceDenied = false;
  state.flags.loanType = null;
  state.flags.loanAmount = 0;
  state.flags.loanDenied = false;
  state.flags.contractSigned = false;
  // 계약금 포기 패널티 기록
  state.flags.contractAbandoned = true;
  state.scoreLog.push('wrong_contract_abandoned');
  // 체크리스트에서 챕터2 항목 제거
  delete state.checklist.contract_signed;
  delete state.checklist.insurance_applied;
  delete state.checklist.loan_chosen;
  delete state.checklist.loan_approved;
  delete state.checklist.deposit_sent;
  // 선택한 매물 초기화
  state.chosenListing = null;
  // 챕터 1 매물 화면으로 이동
  state.chapter = 1;
  saveGame();
  go('ch1_listings');
}

function skipLoanDenied() {
  state.flags.loanType = 'denied';
  state.flags.loanAmount = 0;
  state.flags.loanDenied = true;
  saveGame();
  showToast('⚠ 대출 없이 진행…');
  setTimeout(() => go('ch2_summary'), 800);
}

function skipLoan() {
  // 월세는 대출 없이 진행
  state.flags.loanType = 'none';
  state.flags.loanAmount = 0;
  // 체크리스트는 '학습'으로 인정 (정보 확인 완료)
  checkOff('loan_chosen');
  saveGame();
  go('ch2_summary');
}

}

function raiseLimitChoice(c) {
  // 잔금이 5천만 이하면 split도 문제 안 생김 — 대출금 차감 후 기준
  const L = LISTINGS.find(l => l.id === state.chosenListing);
  const totalBalance = L ? Math.floor(L.deposit * 0.9) : 100_000_000;
  const loanAmount = state.flags.loanAmount || 0;
  const balance = Math.max(0, totalBalance - loanAmount);
  const needsRaise = balance > 50_000_000;

  if (c === 'app') {
    // OTP 입력 시트를 띄우고, 인증이 완료되면 한도 상향
    openOtpSheet(() => {
      state.flags.transferLimit = 'app';
      checkOff('transfer_limit_raised');
      showToast('✓ 한도 상향 완료');
      saveGame();
      setTimeout(() => go('ch4_internet'), 800);
    });
    return; // 비동기 — OTP 콜백에서 다음 화면으로 이동
  } else if (c === 'bank') {
    state.flags.transferLimit = 'bank';
    checkOff('transfer_limit_raised');
    modifyStress(10);
    showToast('영업점 방문… 반나절 소요');
  } else {
    state.flags.transferLimit = 'split';
    // 잔금이 한도 초과일 때만 챕터 5에서 문제 발생
    if (needsRaise) {
      state.flags.ch5SplitPayment = true;
      showToast('당일에 분할 송금하기로 결정');
    } else {
      checkOff('transfer_limit_raised');
      showToast('✓ 한 번 송금으로 충분해요');
    }
  }
  saveGame();
  setTimeout(() => go('ch4_internet'), 800);
}

// OTP 6자리 입력 시트 — 한도 상향용
function openOtpSheet(onSuccess) {
  // 임의의 OTP 6자리 생성 (사용자가 보고 따라 입력)
  const target = String(Math.floor(100000 + Math.random() * 900000));
  state.flags._otpTarget = target;
  state.flags._otpInput = '';

// 슬롯 HTML만 생성 (시트 전체를 다시 그리지 않기 위해)
function renderOtpSlots() {
  const input = state.flags._otpInput || '';
  const isError = state.flags._otpError === true;
  return Array.from({length: 6}, (_, i) => {
    const ch = input[i] || '';
    const filled = !!ch;
    const active = !isError && !filled && input.length === i;
    const errorCls = isError && filled ? 'error' : '';
    return `<div class="otp-slot ${filled ? 'filled' : ''} ${active ? 'active' : ''} ${errorCls}">${ch || ''}</div>`;
  }).join('');
}

// 슬롯 영역만 in-place 업데이트
function updateOtpSlots() {
  const row = document.getElementById('otpInputRow');
  if (row) row.innerHTML = renderOtpSlots();
}

function otpPress(digit) {
  // 에러 상태일 때는 추가 입력 무시 (자동 리셋 대기 중)
  if (state.flags._otpError) return;
  let input = state.flags._otpInput || '';
  if (input.length >= 6) return;
  input += digit;
  state.flags._otpInput = input;
  updateOtpSlots();

  if (input.length === 6) {
    // 인증 검사
    if (input === state.flags._otpTarget) {
      // 성공 — 잠시 채워진 상태 보여주고 콜백 실행
      setTimeout(() => {
        const cb = state.flags._otpSuccess;
        state.flags._otpTarget = null;
        state.flags._otpInput = '';
        state.flags._otpSuccess = null;
        state.flags._otpError = false;
        closeSheet();
        if (typeof cb === 'function') cb();
      }, 500);
    } else {
      // 실패 — 6칸 빨간색 표시 + 흔들기 → 자동 초기화
      state.flags._otpError = true;
      updateOtpSlots();
      const row = document.getElementById('otpInputRow');
      if (row) {
        row.classList.add('otp-shake');
        setTimeout(() => row && row.classList.remove('otp-shake'), 400);
      }
      // 0.9초 뒤 입력 초기화 (빨간색 잠시 보여주고 다시 입력 가능 상태로)
      setTimeout(() => {
        state.flags._otpInput = '';
        state.flags._otpError = false;
        updateOtpSlots();
      }, 900);
    }
  }
}

function otpDelete() {
  const input = state.flags._otpInput || '';
  state.flags._otpInput = input.slice(0, -1);
  updateOtpSlots();
}

      ${current.skipChoices ? `
        <div class="bottom-cta">
          <button class="cta-button" onclick="executeMissionAction(${idx})">${current.cta || '다음'}</button>

// 사용자가 미션 선택지를 선택했을 때
function ch5PickMissionChoice(missionIdx, choiceIdx) {
  const mission = CH5_MISSIONS[missionIdx];
  const choice = mission.choices[choiceIdx];
  if (!choice) return;

  // 이미 답한 미션이면 무시 (버튼 disabled 이지만 안전장치)
  if (state.flags._ch5Picked && state.flags._ch5Picked[missionIdx] !== undefined) return;

  // 액션 실행 — false 반환 시 화면 전환 보류 (예: 한도초과 sheet)
  const result = choice.action();

  // 아쉬운 선택은 오답노트에 기록
  if (!choice.correct) {
    const correctChoice = mission.choices.find(c => c.correct);
    logWrongChoice({
      title: mission.title,
      desc: mission.desc,
      picked: choice.label + (choice.result ? ' → ' + choice.result : ''),
      correctAnswer: correctChoice ? correctChoice.label : '',
      explanation: mission.learn || '',
    });
  }

  if (result === false) {
    // 액션 내부에서 sheet 등으로 처리 중. 결과 sheet는 여기서 띄우지 않음.
    saveGame();
    return;
  }

  // 선택 상태를 기록 → 같은 화면 재렌더링으로 정답 표시 + 팁(파란박스) 노출
  if (!state.flags._ch5Picked) state.flags._ch5Picked = {};
  state.flags._ch5Picked[missionIdx] = choiceIdx;
  saveGame();
  render();
}

// 액션만 있는 미션(예: 하자 점검 분기)
function executeMissionAction(missionIdx) {
  const mission = CH5_MISSIONS[missionIdx];
  if (!mission.action) return ch5NextMission();
  const result = mission.action();
  if (result === false) {
    saveGame();
    return; // 화면 전환은 액션 내부에서
  }
  ch5NextMission();
}

// 다음 미션으로 — 항상 ch5_day 화면으로 이동
function ch5NextMission() {
  state.ch5MissionIdx = (state.ch5MissionIdx || 0) + 1;
  saveGame();
  // 현재 화면이 ch5_day가 아닐 수도 있으므로 (예: ch5_defect_check) 명시적으로 이동
  go('ch5_day');
}

  const downpayment = L ? L.deposit - totalBalance : 11_000_000;  // 계약금 10% (이미 송금됨)

  // 잔금은 아직 송금이 완료되지 않은 상태 → budget 차감하지 않음
  // 계약금은 이미 sendDeposit에서 차감되어 있으므로 추가 차감 없이 '몰수'된 상태
  state.flags.balanceSplit = true;
  state.flags.contractTerminated = true;  // 계약 파기 플래그

        <b style="color:#c92a2a">이미 송금한 계약금 ${fmtMoney(downpayment)}은 전액 돌려받지 못해요.</b><br/>

        • 임대인은 상당한 기간을 정해 최고(催告) 후 계약 해제 가능<br/>

function doReselectListingAfterTermination() {
  // 계약 파기 후 챕터 2 진행 항목 초기화
  state.flags.insurance = false;
  state.flags.insuranceDenied = false;
  state.flags.loanType = null;
  state.flags.loanAmount = 0;
  state.flags.loanDenied = false;
  state.flags.contractSigned = false;
  state.flags.balanceSplit = false;
  // 챕터 5 진행 항목도 초기화
  state.flags.limitRaised = false;
  // 체크리스트에서 챕터2·5 관련 항목 제거
  delete state.checklist.contract_signed;
  delete state.checklist.insurance_applied;
  delete state.checklist.loan_chosen;
  delete state.checklist.loan_approved;
  delete state.checklist.deposit_sent;
  delete state.checklist.balance_sent;
  // 선택한 매물 초기화
  state.chosenListing = null;
  // 챕터 1 매물 화면으로 이동
  state.chapter = 1;
  saveGame();
  go('ch1_listings');
}

function raiseLimitNow() {
  // 잔금 송금 시점의 긴급 한도 상향 — OTP 인증 후 실행
  closeSheet();
  openOtpSheet(() => {
    const L = LISTINGS.find(l=>l.id===state.chosenListing);
    const totalBalance = L ? Math.floor(L.deposit * 0.9) : 100_000_000;
    const loanAmount = state.flags.loanAmount || 0;
    const amount = Math.max(0, totalBalance - loanAmount);
    // 임차인은 (잔금 − 대출금)만 자기 자금에서 송금. 대출금은 은행이 임대인에게 직접 송금.
    modifyBudget(-amount);
    modifyStress(5);
    checkOff('balance_sent');
    showToast(`✓ OTP 인증 후 ${fmtMoney(amount)} 송금 완료`);
    setTimeout(() => ch5NextMission(), 1200);
  });
}

function meterSelectTab(key) {
  state.flags._meterActive = key;
  go('ch5_meter');

function meterShoot(key) {
  // 셔터 플래시 효과
  const flash = document.getElementById('shutterFlash');
  if (flash) {
    flash.classList.add('active');
    // 짧은 진동 (지원되는 디바이스만)
    if (window.navigator && window.navigator.vibrate) {
      try { window.navigator.vibrate(40); } catch(e) {}
    }
  }
  setTimeout(() => {
    state.flags.meterShots[key] = true;
    saveGame();
    // 다음 미촬영 미터로 자동 이동
    const order = ['electric', 'gas', 'water'];
    const next = order.find(k => !state.flags.meterShots[k]);
    state.flags._meterActive = next || key;
    go('ch5_meter');
  }, 380);
}

function meterComplete() {
  // 채점 — 모두 찍었으면 correct
  const shots = state.flags.meterShots || {};
  const allShot = shots.electric && shots.gas && shots.water;
  if (allShot) {
    checkOff('meter_check');
    state.scoreLog.push('correct_meter');
    openSheet(`

      </div></div>
      <button class="cta-button mt-16" onclick="closeSheet(); ch5NextMission()">계속하기</button>
    `, 'good');
  } else {
    ch5NextMission();
  }
}

// 슬라이더 인터랙션
let _sendSliderState = null;

function sendSliderStart(e) {
  const wrap = document.getElementById('sendSliderWrap');
  const handle = document.getElementById('sendSliderHandle');
  if (!wrap || !handle) return;
  e.preventDefault();
  handle.classList.remove('snapback');

  const startX = (e.touches ? e.touches[0].clientX : e.clientX);
  const wrapRect = wrap.getBoundingClientRect();
  const maxLeft = wrapRect.width - 56 - 8;

  _sendSliderState = { startX, maxLeft, currentLeft: 4, completed: false };

  document.addEventListener('mousemove', sendSliderMove);
  document.addEventListener('touchmove', sendSliderMove, { passive: false });
  document.addEventListener('mouseup', sendSliderEnd);
  document.addEventListener('touchend', sendSliderEnd);
}

function sendSliderMove(e) {
  if (!_sendSliderState) return;
  e.preventDefault();
  const x = (e.touches ? e.touches[0].clientX : e.clientX);
  const delta = x - _sendSliderState.startX;
  let newLeft = 4 + delta;
  if (newLeft < 4) newLeft = 4;
  if (newLeft > _sendSliderState.maxLeft) newLeft = _sendSliderState.maxLeft;
  _sendSliderState.currentLeft = newLeft;

  const handle = document.getElementById('sendSliderHandle');
  const fill   = document.getElementById('sendSliderFill');
  const text   = document.getElementById('sendSliderText');
  if (handle) handle.style.left = newLeft + 'px';
  if (fill)   fill.style.width  = (newLeft + 56) + 'px';
  const progress = (newLeft - 4) / (_sendSliderState.maxLeft - 4);
  if (text) {
    if (progress > 0.5) text.classList.add('invert'); else text.classList.remove('invert');
  }
  if (progress >= 0.97 && !_sendSliderState.completed) {
    _sendSliderState.completed = true;
    sendSliderEnd();
  }
}

function sendSliderEnd() {
  document.removeEventListener('mousemove', sendSliderMove);
  document.removeEventListener('touchmove', sendSliderMove);
  document.removeEventListener('mouseup', sendSliderEnd);
  document.removeEventListener('touchend', sendSliderEnd);
  if (!_sendSliderState) return;

  const handle = document.getElementById('sendSliderHandle');
  const fill   = document.getElementById('sendSliderFill');
  const text   = document.getElementById('sendSliderText');

  if (_sendSliderState.completed) {
    // 송금 완료 처리
    _sendSliderState = null;
    executeBalanceSend();
  } else {
    // 슬라이드 미완료 — 처음으로 돌아감
    if (handle) {
      handle.classList.add('snapback');
      handle.style.left = '4px';
    }
    if (fill) fill.style.width = '0';
    if (text) text.classList.remove('invert');
    _sendSliderState = null;
  }
}

function executeBalanceSend() {

function pickNotifyChannel(choice) {
  state.flags.notifyChoice = choice;
  state.flags.notifyStep = 1;
  state.knowledge += 1;
  if (choice === 'kakao') {
    state.scoreLog && state.scoreLog.push('notify_correct');
  } else {
    state.scoreLog && state.scoreLog.push('notify_' + choice);
  }
  saveGame();
  render();
}

function finishNotify() {
  state.flags.notifyStep = 0; // 리셋
  checkOff('landlord_notified');
  showToast('✓ 카톡으로 하자 통보 완료 (증거 확보)');
  ch5NextMission();
}

/* -------------------------------------------------------------------
   [SCENE] 챕터 6 메인 일자별 화면
   ─ CH6_EVENTS 배열을 인덱스 순으로 진행
   ─ 각 이벤트 타입에 따라 다른 렌더링
------------------------------------------------------------------- */
defineScene('ch6_day_view', () => {
  const idx = state.ch6DayIdx || 0;

  // 모든 이벤트 완료 → 엔딩으로
  if (idx >= CH6_EVENTS.length) {
    setTimeout(() => go('ending'), 100);
    return `<div class="main-content"><p class="text-center text-secondary">평가 중...</p></div>`;
  }

  const event = CH6_EVENTS[idx];
  setDay(event.day);

  // 완료된 이벤트들 (간략)
  const done = CH6_EVENTS.slice(0, idx);
  const upcoming = CH6_EVENTS.slice(idx + 1);

  // event 타입에서 사용자가 이미 답을 골랐는지
  const pickedIdx = (state.flags._ch6Picked && state.flags._ch6Picked[idx] !== undefined)
    ? state.flags._ch6Picked[idx] : null;
  const answered = pickedIdx !== null;

  return `
    <div class="main-content">
      <div class="clock-display">
        <div class="clock-time">D+${event.day}</div>
        <div class="clock-label">정착 ${idx + 1} / ${CH6_EVENTS.length}</div>
      </div>

      <div class="progress-bar mb-16">
        <div class="progress-fill" style="width:${((idx + 1) / CH6_EVENTS.length) * 100}%"></div>
      </div>

      <div class="mission-current">
        <div class="mission-label">D+${event.day} · 오늘 할 일</div>
        <div class="mission-title">${event.icon} ${event.title}</div>
        <div class="mission-desc">${event.desc}</div>
      </div>

      ${event.type === 'event' ? `
        <h3 class="detail-section-title">어떻게 할까요?</h3>
        <div class="choices">
          ${event.choices.map((c, ci) => {
            let cls = '';
            if (answered) {
              if (c.correct) cls = 'completed';
              else if (ci === pickedIdx) cls = 'incorrect';
            }
            const prefix = answered ? (c.correct ? '✓ ' : (ci === pickedIdx ? '✗ ' : '')) : '';
            return `
              <button class="choice-btn ${cls}"
                      ${answered ? 'disabled' : ''}
                      onclick="ch6PickChoice(${ci})">
                <span>${prefix}${c.label}</span>
                ${!answered ? '<span class="arrow">→</span>' : ''}
              </button>
            `;
          }).join('')}
        </div>

        ${answered ? (() => {
          const picked = event.choices[pickedIdx];
          return `
            <div class="learn-box mt-16" style="background:${picked.correct ? 'var(--color-primary-soft,#ECFDF5)' : 'var(--color-warning-bg,#FFF7E6)'};border-color:${picked.correct ? 'var(--color-primary,#22C55E)' : 'var(--color-warning-strong,#DD6B20)'}">
              <div class="learn-box-header" style="color:${picked.correct ? 'var(--color-primary-dark,#16A34A)' : 'var(--color-warning-strong,#DD6B20)'}">${picked.correct ? '✓ 좋은 선택' : '⚠ 다음엔 다르게'}</div>
              <div class="learn-box-content">→ ${picked.result}</div>
            </div>
            <div class="learn-box mt-16">
              <div class="learn-box-header">📚 ${event.learnTitle}</div>
              <div class="learn-box-content">${event.learn}</div>
            </div>
          `;
        })() : ''}
      ` : `
        <div class="learn-box">
          <div class="learn-box-header">📚 ${event.learnTitle}</div>
          <div class="learn-box-content">${event.learn}</div>
        </div>
      `}

      ${upcoming.length > 0 ? `
        <h3 class="detail-section-title">곧 할 일</h3>
        ${upcoming.slice(0, 3).map(e => `
          <div class="mission-upcoming">
            <div class="mission-upcoming-time">D+${e.day}</div>
            <div class="mission-upcoming-text">${e.title}</div>
          </div>
        `).join('')}
      ` : ''}

      ${done.length > 0 ? `
        <h3 class="detail-section-title">완료한 일</h3>
        ${done.map(e => `
          <div class="mission-done">D+${e.day} · ${e.title}</div>
        `).join('')}
      ` : ''}
    </div>

    ${event.type === 'event' ? (answered ? (() => {
      const picked = event.choices[pickedIdx];
      // 정답을 골랐고 correctFlow가 있으면 체험 화면으로 분기
      if (picked.correct && event.correctFlow) {
        return `
          <div class="bottom-cta">
            <button class="cta-button" onclick="ch6StartCorrectFlow()">직접 해보기 →</button>
          </div>
        `;
      }
      return `
        <div class="bottom-cta">
          <button class="cta-button" onclick="ch6Advance()">다음으로</button>
        </div>
      `;
    })() : '') : `
      <div class="bottom-cta">
        <button class="cta-button" onclick="ch6Complete()">${event.cta || '진행하기'}</button>
      </div>
    `}
  `;
});

  const idx = state.ch6DayIdx || 0;
