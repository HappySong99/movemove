<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>첫 이사 — 대한민국 사회초년생 첫 독립 시뮬레이션</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
/* ===================================================================
   디자인 토큰 (토스 스타일)
=================================================================== */
:root {
  --color-bg: #FFFFFF;
  --color-surface: #F9FAFB;
  --color-surface-2: #F2F4F6;
  --color-primary: #22C55E;
  --color-primary-dark: #16A34A;
  --color-primary-soft: #ECFDF5;
  --color-text-primary: #191F28;
  --color-text-secondary: #4E5968;
  --color-text-tertiary: #8B95A1;
  --color-border: #E5E8EB;
  --color-border-soft: #F2F4F6;
  --color-warning-bg: #FFF7E6;
  --color-warning: #B7791F;
  --color-warning-strong: #DD6B20;
  --color-info-bg: #EBF8FF;
  --color-info: #2B6CB0;
  --color-danger-bg: #FFF5F5;
  --color-danger: #C53030;
  --color-purple-bg: #FAF5FF;
  --color-purple: #6B46C1;

  --shadow-card: 0 1px 3px rgba(0, 0, 0, 0.04);
  --shadow-elevated: 0 4px 12px rgba(0, 0, 0, 0.06);
  --shadow-popup: 0 8px 24px rgba(0, 0, 0, 0.12);

  --radius-card: 16px;
  --radius-button: 12px;
  --radius-chip: 8px;
  --radius-pill: 999px;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: #F2F4F6;
  color: var(--color-text-primary);
  line-height: 1.5;
  letter-spacing: -0.01em;
  font-feature-settings: "ss06" on;
  overscroll-behavior: none;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
}

/* ===================================================================
   앱 컨테이너 (모바일 퍼스트 — 가운데 정렬)
=================================================================== */
#app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  margin: 0 auto;
  background: var(--color-bg);
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 40px rgba(0,0,0,0.04);
}

/* ===================================================================
   상단 헤더 (D-Day + 자원)
=================================================================== */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--color-bg);
  border-bottom: 1px solid var(--color-border-soft);
  padding: 14px 20px 12px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.dday-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--color-primary-soft);
  color: var(--color-primary-dark);
  font-size: 13px;
  font-weight: 700;
  border-radius: var(--radius-pill);
  letter-spacing: -0.02em;
}

.chapter-label {
  font-size: 12px;
  color: var(--color-text-tertiary);
  font-weight: 500;
}

.header-resources {
  display: flex;
  gap: 12px;
  font-size: 12px;
  color: var(--color-text-secondary);
}

.resource-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.resource-item .icon {
  font-size: 13px;
}

.resource-item .value {
  font-weight: 700;
  color: var(--color-text-primary);
  font-variant-numeric: tabular-nums;
}

/* ===================================================================
   메인 콘텐츠 영역
=================================================================== */
.main-content {
  flex: 1;
  padding: 20px;
  padding-bottom: 120px;
  animation: fadeInUp 0.35s ease-out;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===================================================================
   카드 컴포넌트
=================================================================== */
.card {
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: 20px;
  margin-bottom: 12px;
}

.card-flat {
  background: var(--color-surface);
  border-radius: var(--radius-card);
  padding: 20px;
  margin-bottom: 12px;
}

.card-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin: 0 0 10px;
  letter-spacing: -0.02em;
  line-height: 1.35;
}

.card-subtitle {
  font-size: 14px;
  color: var(--color-text-secondary);
  margin: 0 0 16px;
  line-height: 1.55;
}

.card-body {
  font-size: 15px;
  color: var(--color-text-primary);
  line-height: 1.6;
}

.card-body p {
  margin: 0 0 12px;
}

.card-body p:last-child {
  margin-bottom: 0;
}

/* 화면 타이틀 */
.screen-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin: 8px 0 4px;
  letter-spacing: -0.03em;
  line-height: 1.3;
}

.screen-subtitle {
  font-size: 15px;
  color: var(--color-text-secondary);
  margin: 0 0 20px;
  line-height: 1.55;
}

/* ===================================================================
   선택지 (CTA + 보조)
=================================================================== */
.choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 8px;
}

.choice-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 18px 20px;
  background: var(--color-surface);
  border-radius: var(--radius-button);
  font-size: 15px;
  font-weight: 600;
  color: var(--color-text-primary);
  text-align: left;
  transition: all 0.15s ease;
  line-height: 1.45;
  letter-spacing: -0.01em;
}

.choice-btn:active {
  background: var(--color-surface-2);
  transform: scale(0.99);
}

.choice-btn .arrow {
  color: var(--color-text-tertiary);
  font-size: 18px;
  flex-shrink: 0;
  margin-left: 12px;
}

.choice-btn.recommended {
  background: var(--color-primary-soft);
  color: var(--color-primary-dark);
}

.choice-btn.recommended .arrow {
  color: var(--color-primary);
}

/* ===================================================================
   하단 고정 CTA
=================================================================== */
.bottom-cta {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  padding: 16px 20px 28px;
  background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, var(--color-bg) 30%);
  z-index: 50;
}

.cta-button {
  width: 100%;
  height: 56px;
  background: var(--color-primary);
  color: white;
  font-size: 16px;
  font-weight: 700;
  border-radius: var(--radius-button);
  letter-spacing: -0.01em;
  transition: all 0.15s ease;
}

.cta-button:active {
  background: var(--color-primary-dark);
  transform: scale(0.99);
}

.cta-button:disabled {
  background: var(--color-border);
  color: var(--color-text-tertiary);
  cursor: not-allowed;
}

.cta-button.secondary {
  background: var(--color-surface);
  color: var(--color-text-primary);
}

.cta-button.secondary:active {
  background: var(--color-surface-2);
}

/* ===================================================================
   학습 박스
=================================================================== */
.learn-box {
  background: var(--color-info-bg);
  border-radius: var(--radius-card);
  padding: 18px 20px;
  margin: 16px 0 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.learn-box-header {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 700;
  color: var(--color-info);
  letter-spacing: -0.01em;
}

.learn-box-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin: 0;
  line-height: 1.45;
}

.learn-box-content {
  font-size: 14px;
  color: var(--color-text-primary);
  line-height: 1.6;
  letter-spacing: -0.005em;
}

.learn-box-content ul {
  margin: 6px 0 0;
  padding-left: 18px;
}

.learn-box-content li {
  margin-bottom: 4px;
}

/* 경고 박스 */
.warn-box {
  background: var(--color-warning-bg);
  border-radius: var(--radius-card);
  padding: 16px 18px;
  margin: 12px 0;
}

.warn-box-header {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 700;
  color: var(--color-warning-strong);
  margin-bottom: 4px;
}

.warn-box-content {
  font-size: 14px;
  color: var(--color-text-primary);
  line-height: 1.55;
}

/* 위험 박스 */
.danger-box {
  background: var(--color-danger-bg);
  border-radius: var(--radius-card);
  padding: 16px 18px;
  margin: 12px 0;
}

.danger-box-header {
  font-size: 13px;
  font-weight: 700;
  color: var(--color-danger);
  margin-bottom: 4px;
}

.danger-box-content {
  font-size: 14px;
  color: var(--color-text-primary);
  line-height: 1.55;
}

/* ===================================================================
   매물 카드
=================================================================== */
.listing-card {
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: 18px;
  margin-bottom: 10px;
  transition: all 0.15s ease;
}

.listing-card:active {
  transform: scale(0.99);
  background: var(--color-surface);
}

.listing-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 8px;
}

.listing-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin: 0;
  line-height: 1.4;
}

.listing-tag {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: var(--radius-chip);
  background: var(--color-surface);
  color: var(--color-text-secondary);
}

.listing-tag.hot {
  background: var(--color-danger-bg);
  color: var(--color-danger);
}

.listing-tag.cheap {
  background: var(--color-warning-bg);
  color: var(--color-warning-strong);
}

.listing-tag.good {
  background: var(--color-primary-soft);
  color: var(--color-primary-dark);
}

.listing-price {
  font-size: 18px;
  font-weight: 700;
  color: var(--color-text-primary);
  margin: 6px 0;
  letter-spacing: -0.02em;
}

.listing-meta {
  font-size: 13px;
  color: var(--color-text-secondary);
  display: flex;
  flex-wrap: wrap;
  gap: 4px 10px;
}

.listing-meta .dot {
  color: var(--color-text-tertiary);
}

/* ===================================================================
   체크리스트 항목
=================================================================== */
.check-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--color-surface);
  border-radius: var(--radius-button);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.check-item:active {
  transform: scale(0.99);
}

.check-box {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--color-border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.check-item.checked .check-box {
  background: var(--color-primary);
  border-color: var(--color-primary);
}

.check-item.checked .check-box::after {
  content: '✓';
  color: white;
  font-size: 13px;
  font-weight: 800;
  animation: checkPop 0.3s ease-out;
}

@keyframes checkPop {
  from { transform: scale(0); }
  to { transform: scale(1); }
}

.check-text {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text-primary);
  line-height: 1.4;
}

.check-text .sub {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--color-text-tertiary);
  margin-top: 2px;
}

.check-item.checked .check-text {
  color: var(--color-text-tertiary);
  text-decoration: line-through;
  text-decoration-color: var(--color-text-tertiary);
}

/* ===================================================================
   진행률 바
=================================================================== */
.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--color-border-soft);
  border-radius: var(--radius-pill);
  overflow: hidden;
  margin: 8px 0;
}

.progress-fill {
  height: 100%;
  background: var(--color-primary);
  border-radius: var(--radius-pill);
  transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ===================================================================
   인포 행 (스펙 정보 같은 것)
=================================================================== */
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--color-border-soft);
  font-size: 14px;
}

.info-row:last-child {
  border-bottom: none;
}

.info-label {
  color: var(--color-text-secondary);
  font-weight: 500;
}

.info-value {
  color: var(--color-text-primary);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
}

.info-value.warn {
  color: var(--color-warning-strong);
}

.info-value.danger {
  color: var(--color-danger);
}

.info-value.good {
  color: var(--color-primary-dark);
}

/* ===================================================================
   문서 미니게임 (등기부등본 등)
=================================================================== */
.document-section {
  background: var(--color-surface);
  border-radius: var(--radius-card);
  padding: 16px 18px;
  margin-bottom: 10px;
  position: relative;
  cursor: pointer;
  transition: all 0.15s ease;
}

.document-section:active {
  background: var(--color-surface-2);
}

.document-section.found {
  background: var(--color-warning-bg);
}

.document-section.safe {
  background: var(--color-primary-soft);
}

.document-section.warn {
  background: var(--color-danger-bg);
  border: 1px solid rgba(197, 48, 48, 0.2);
}

.doc-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--color-text-tertiary);
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}

.doc-content {
  font-size: 13px;
  color: var(--color-text-primary);
  line-height: 1.5;
  font-family: 'D2Coding', 'Pretendard', monospace;
}

.doc-content .highlight {
  background: rgba(255, 149, 0, 0.2);
  padding: 1px 4px;
  border-radius: 4px;
  font-weight: 700;
}

.doc-content .danger-highlight {
  background: rgba(245, 68, 82, 0.15);
  padding: 1px 4px;
  border-radius: 4px;
  font-weight: 700;
  color: var(--color-danger);
}

/* ===================================================================
   특약 OX 카드
=================================================================== */
.special-clause-card {
  background: var(--color-surface);
  border-radius: var(--radius-card);
  padding: 16px;
  margin-bottom: 10px;
}

.special-clause-text {
  font-size: 14px;
  color: var(--color-text-primary);
  line-height: 1.55;
  margin-bottom: 12px;
}

.ox-buttons {
  display: flex;
  gap: 8px;
}

.ox-btn {
  flex: 1;
  height: 44px;
  background: var(--color-bg);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-button);
  font-size: 14px;
  font-weight: 700;
  color: var(--color-text-primary);
  transition: all 0.15s ease;
}

.ox-btn:active {
  transform: scale(0.97);
}

.ox-btn.selected.correct {
  background: var(--color-primary-soft);
  border-color: var(--color-primary);
  color: var(--color-primary-dark);
}

.ox-btn.selected.wrong {
  background: var(--color-danger-bg);
  border-color: var(--color-danger);
  color: var(--color-danger);
}

.ox-result {
  margin-top: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-chip);
  font-size: 13px;
  line-height: 1.5;
}

.ox-result.correct {
  background: var(--color-primary-soft);
  color: var(--color-primary-dark);
}

.ox-result.wrong {
  background: var(--color-danger-bg);
  color: var(--color-danger);
}

/* ===================================================================
   드래그 분류 (짐 분류)
=================================================================== */
.drag-zones {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.drag-zone {
  min-height: 120px;
  background: var(--color-surface);
  border: 2px dashed var(--color-border);
  border-radius: var(--radius-card);
  padding: 10px 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: all 0.15s ease;
}

.drag-zone.drag-over {
  border-color: var(--color-primary);
  background: var(--color-primary-soft);
}

.drag-zone-title {
  font-size: 12px;
  font-weight: 700;
  text-align: center;
  color: var(--color-text-secondary);
  margin-bottom: 4px;
}

.drag-item {
  padding: 8px 10px;
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-chip);
  font-size: 12px;
  font-weight: 600;
  color: var(--color-text-primary);
  cursor: grab;
  user-select: none;
  text-align: center;
}

.drag-item:active {
  cursor: grabbing;
  opacity: 0.7;
}

.drag-item.dragging {
  opacity: 0.4;
}

.drag-pool {
  background: var(--color-surface);
  border-radius: var(--radius-card);
  padding: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  min-height: 80px;
  margin-bottom: 12px;
}

/* ===================================================================
   시계 (이사 당일)
=================================================================== */
.clock-display {
  background: var(--color-text-primary);
  color: white;
  border-radius: var(--radius-card);
  padding: 18px 20px;
  margin-bottom: 16px;
  text-align: center;
}

.clock-time {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}

.clock-label {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  margin-top: 4px;
  font-weight: 600;
}

/* ===================================================================
   엔딩 화면
=================================================================== */
.ending-hero {
  text-align: center;
  padding: 40px 20px;
}

.ending-emoji {
  font-size: 64px;
  margin-bottom: 16px;
}

.ending-grade {
  font-size: 56px;
  font-weight: 800;
  color: var(--color-primary);
  margin: 12px 0 4px;
  letter-spacing: -0.04em;
}

.ending-score {
  font-size: 18px;
  color: var(--color-text-secondary);
  font-weight: 600;
  margin-bottom: 12px;
}

.ending-message {
  font-size: 16px;
  color: var(--color-text-primary);
  line-height: 1.6;
  margin: 20px 0 24px;
}

/* ===================================================================
   인트로 / 챕터 인트로
=================================================================== */
.intro-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 60px 24px 40px;
}

.intro-logo {
  font-size: 36px;
  font-weight: 800;
  color: var(--color-text-primary);
  letter-spacing: -0.04em;
  margin-bottom: 8px;
}

.intro-subtitle {
  font-size: 14px;
  color: var(--color-text-secondary);
  margin-bottom: 40px;
  font-weight: 500;
}

.intro-illustration {
  font-size: 80px;
  margin: 20px 0 32px;
  line-height: 1;
}

.intro-description {
  font-size: 15px;
  color: var(--color-text-primary);
  line-height: 1.7;
  margin-bottom: 32px;
}

.intro-features {
  text-align: left;
  width: 100%;
  margin-bottom: 32px;
}

.intro-feature {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--color-border-soft);
}

.intro-feature:last-child {
  border-bottom: none;
}

.intro-feature-icon {
  width: 36px;
  height: 36px;
  background: var(--color-primary-soft);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.intro-feature-text {
  font-size: 14px;
  color: var(--color-text-primary);
  line-height: 1.5;
  font-weight: 500;
}

.intro-feature-text .sub {
  display: block;
  font-size: 12px;
  font-weight: 400;
  color: var(--color-text-tertiary);
  margin-top: 2px;
}

/* 챕터 인트로 */
.chapter-intro {
  text-align: center;
  padding: 60px 20px 40px;

  transition: all 0.15s ease;

<body>
<div id="app">
  <div class="desktop-hint">📱 모바일 화면 기준으로 최적화된 게임입니다</div>
  <div id="game-root"></div>
</div>

<script>
/* ===================================================================
   GAME ENGINE — 게임 엔진 코어
   첫 이사 (First Move) — v1.0
=================================================================== */

// 게임 상태
let state = {
  scene: 'intro',          // 현재 화면 ID
  chapter: 0,              // 0=인트로, 1~6=챕터
  budget: 0,               // 예산 (원) — 사용자 입력으로 초기화
  initialBudget: 0,        // 초기 입력 예산 (참조용)
  stress: 30,              // 스트레스 0~100
  dday: -30,               // D-Day
  knowledge: 0,            // 학습 포인트
  checklist: {},           // 체크리스트 완료 상태
  flags: {},               // 진행 플래그 (선택 기록, 분기 등)
  visited: {},             // 방문한 매물 체크 상태
  chosenListing: null,     // 선택한 매물
  scoreLog: [],            // 최종 평가용 로그
  ch5MissionIdx: 0,        // 챕터 5 미션 인덱스
  ch6DayIdx: 0,            // 챕터 6 일자 인덱스
};

// 저장 키
const SAVE_KEY = 'firstmove_save_v1';

function saveGame() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  } catch(e) { /* localStorage 불가 환경 무시 */ }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const loaded = JSON.parse(raw);
      state = { ...state, ...loaded };
      return true;
    }
  } catch(e) {}
  return false;
}

function resetGame() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
  state = {
    scene: 'intro', chapter: 0,
    budget: 0, initialBudget: 0, stress: 30,
    dday: -30, knowledge: 0,
    checklist: {}, flags: {}, visited: {},
    chosenListing: null, scoreLog: [],
    ch5MissionIdx: 0, ch6DayIdx: 0,
  };
  render();
}

// 유틸: 금액 표시 (1억 5000만)
function fmtMoney(won) {
  if (won >= 100_000_000) {
    const eok = Math.floor(won / 100_000_000);
    const man = Math.floor((won % 100_000_000) / 10_000);
    if (man === 0) return `${eok}억`;
    return `${eok}억 ${man.toLocaleString()}만`;
  }
  if (won >= 10_000) {
    const man = Math.floor(won / 10_000);
    return `${man.toLocaleString()}만`;
  }
  return won.toLocaleString() + '원';
}

// 체크리스트 추가
function checkOff(id) {
  if (!state.checklist[id]) {
    state.checklist[id] = true;
    state.knowledge += 1;
    saveGame();
  }
}

// 자원 변동
function modifyBudget(delta) { state.budget += delta; saveGame(); }
function modifyStress(delta) {
  state.stress = Math.max(0, Math.min(100, state.stress + delta));
  saveGame();
}
function setDay(d) { state.dday = d; saveGame(); }

// 토스트
function showToast(msg, duration = 2000) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), duration);
}

// 시트 (하단 모달)
function openSheet(html) {
  const overlay = document.createElement('div');
  overlay.className = 'sheet-overlay';
  overlay.innerHTML = `
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-handle"></div>
      ${html}
    </div>
  `;
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
  return overlay;
}

function closeSheet() {
  document.querySelectorAll('.sheet-overlay').forEach(o => o.remove());
}

// 화면 이동
function go(scene) {
  state.scene = scene;
  saveGame();
  render();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// 챕터 진입
function enterChapter(n, firstScene) {
  state.chapter = n;
  go(firstScene);
}

/* ===================================================================
   메인 렌더러
=================================================================== */
function render() {
  const root = document.getElementById('game-root');
  const scene = SCENES[state.scene];

  if (!scene) {
    root.innerHTML = `<div class="main-content"><h2 class="screen-title">⚠ 화면 오류</h2>
    <p>알 수 없는 화면: ${state.scene}</p>
    <button class="cta-button" onclick="resetGame()">처음부터 다시</button></div>`;
    return;
  }

  let headerHTML = '';
  if (state.chapter > 0 && state.scene !== 'ending') {
    const ddayText = state.dday < 0 ? `D${state.dday}` :
                     state.dday === 0 ? 'D-DAY' : `D+${state.dday}`;
    headerHTML = `
      <div class="app-header">
        <div class="header-top">
          <div class="dday-badge">📅 ${ddayText}</div>
          <div class="chapter-label">CHAPTER ${state.chapter} / 6</div>
        </div>
        <div class="header-resources">
          <div class="resource-item"><span class="icon">💰</span><span class="value">${fmtMoney(state.budget)}</span></div>
          <div class="resource-item"><span class="icon">📚</span><span class="value">${state.knowledge}</span></div>
          <div class="resource-item"><span class="icon">${state.stress > 70 ? '😰' : state.stress > 40 ? '😐' : '🙂'}</span><span class="value">${state.stress}</span></div>
        </div>
      </div>
    `;
  }

  const sceneHTML = scene();
  root.innerHTML = headerHTML + sceneHTML;

  // 챕터 진입 시 D-Day 자동 설정
  if (scene.dday !== undefined) setDay(scene.dday);
}

/* ===================================================================
   SCENES 객체 — 모든 화면이 이 안에 함수로 등록
   각 함수는 HTML 문자열을 반환
=================================================================== */
const SCENES = {};

// 데이터 등록 함수
function defineScene(id, fn) { SCENES[id] = fn; }
function defineSceneAtDay(id, day, fn) {
  const wrap = function() { setDay(day); return fn(); };
  SCENES[id] = wrap;
}

/* ===================================================================
   인트로 화면
=================================================================== */
defineScene('intro', () => `
  <div class="main-content">
    <div class="intro-screen">
      <div class="intro-logo">첫 이사</div>
      <div class="intro-subtitle">대한민국 사회초년생 첫 독립 시뮬레이션</div>

      <div class="intro-illustration">🏠</div>

      <div class="intro-description">
        통장 잔고와 부모 지원, 모아둔 돈까지<br/>
        본인이 가진 예산을 직접 정해보세요.<br/><br/>
        30일에 걸친 집 찾기, 계약, 잔금,<br/>
        이사, 행정 절차를 직접 체험하며<br/>
        진짜로 배워가세요.
      </div>

      <div class="intro-features">
        <div class="intro-feature">
          <div class="intro-feature-icon">📅</div>
          <div class="intro-feature-text">
            30일 D-Day 시스템
            <span class="sub">매일 새로운 미션과 결정</span>
          </div>
        </div>
        <div class="intro-feature">
          <div class="intro-feature-icon">📋</div>
          <div class="intro-feature-text">
            45개 체크리스트
            <span class="sub">자연스럽게 외워지는 학습 구조</span>
          </div>
        </div>
        <div class="intro-feature">
          <div class="intro-feature-icon">⚖️</div>
          <div class="intro-feature-text">
            실제 법률·절차 기반
            <span class="sub">등기부등본, 확정일자, 보증보험</span>
          </div>
        </div>
        <div class="intro-feature">
          <div class="intro-feature-icon">🚛</div>
          <div class="intro-feature-text">
            이사 당일 멀티태스킹
            <span class="sub">검침, 잔금, 열쇠, 하자 동시 진행</span>
          </div>
        </div>
      </div>

      <p class="text-secondary text-sm" style="margin-top:8px">
        예상 플레이 시간 : 약 20~30분<br/>
        진행 상황은 자동으로 저장됩니다
      </p>
    </div>
  </div>

  <div class="bottom-cta">
    <button class="cta-button" onclick="startGame()">시작하기</button>
  </div>
`);

function startGame() {
  // 저장된 게임이 있으면 묻기
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.chapter > 0) {
        if (confirm('이어서 플레이할까요?\n취소하면 처음부터 다시 시작합니다.')) {
          loadGame();
          render();
          return;
        } else {
          resetGame();
        }
      }
    }
  } catch(e) {}
  enterChapter(1, 'ch1_intro');
}

/* ===================================================================
   숫자 입력 보조 — 만원 단위 입력 받기
=================================================================== */
function parseManToWon(str) {
  // "15000" (만원) → 150_000_000 (원)
  if (!str) return 0;
  const n = parseInt(String(str).replace(/[^0-9]/g, ''), 10);
  if (isNaN(n)) return 0;
  return n * 10_000;
}

function updateBudgetPreview(val) {
  const won = parseManToWon(val);
  const preview = document.getElementById('budgetPreview');
  if (preview) {
    preview.textContent = won > 0 ? `= ${fmtMoney(won)}` : '금액을 입력해주세요';
  }
}

function setBudgetQuick(man) {
  const input = document.getElementById('budgetInput');
  if (input) {
    input.value = man;
    updateBudgetPreview(man);
  }
}

function confirmBudget() {
  const input = document.getElementById('budgetInput');
  if (!input) return;
  const won = parseManToWon(input.value);
  if (won < 1_000_000) {
    showToast('100만원 이상 입력해주세요');
    return;
  }
  state.budget = won;
  state.initialBudget = won;
  saveGame();
  go('ch1_jeonse_vs_wolse');
}

function raiseLimitChoice(c) {
  // 잔금이 5천만 이하면 split도 문제 안 생김
  const L = LISTINGS.find(l => l.id === state.chosenListing);
  const balance = L ? Math.floor(L.deposit * 0.9) : 100_000_000;
  const needsRaise = balance > 50_000_000;

  if (c === 'app') {
    state.flags.transferLimit = 'app';
    checkOff('transfer_limit_raised');
    showToast('✓ 한도 상향 완료');
  } else if (c === 'bank') {
    state.flags.transferLimit = 'bank';
    checkOff('transfer_limit_raised');
    modifyStress(10);
    showToast('영업점 방문… 반나절 소요');
  } else {
    state.flags.transferLimit = 'split';
    // 잔금이 한도 초과일 때만 챕터 5에서 문제 발생
    if (needsRaise) {
      state.flags.ch5SplitPayment = true;
      showToast('당일에 분할 송금하기로 결정');
    } else {
      checkOff('transfer_limit_raised');
      showToast('✓ 한 번 송금으로 충분해요');
    }
  }
  saveGame();
  setTimeout(() => go('ch4_internet'), 800);
}

            <div class="mission-upcoming-time">${m.time}</div>
            <div class="mission-upcoming-text">${m.label} — ${m.title}</div>
          </div>
        `).join('')}

      ${done.length > 0 ? `

        ${done.slice(-3).map(m => `
          <div class="mission-done">${m.time} ${m.label}</div>
        `).join('')}
      ` : ''}
    </div>

    <div class="bottom-cta">
      <button class="cta-button" onclick="executeMission()">${current.cta}</button>
    </div>
  `;

function executeMission() {
  const idx = state.ch5MissionIdx || 0;
  const m = CH5_MISSIONS[idx];

  // 돌발 이벤트 체크 (있으면 먼저 처리)
  if (m.eventGen) {
    const ev = m.eventGen();
    if (ev && !state.flags[`ch5_ev_${idx}`]) {
      state.flags[`ch5_ev_${idx}`] = true;
      saveGame();
      openSheet(`
        <div class="sheet-title">${ev.type === 'warn' ? '⚠' : 'ℹ'} ${ev.title}</div>
        <div class="card-flat"><div class="card-body">${ev.desc}</div></div>
        <div class="choices mt-16">
          ${ev.choices.map((c, i) => `
            <button class="choice-btn" onclick="closeSheet(); execEventChoice(${idx}, ${i})">
              <span>${c.label}</span><span class="arrow">→</span>
            </button>
          `).join('')}
        </div>
      `);
      // 임시 저장
      window._ch5EventChoices = ev.choices;
      return;
    }
  }

  // 액션 실행
  const result = m.action();
  if (result === false) {
    saveGame();
    return; // 화면 전환은 액션 내부에서 처리
  }

  state.ch5MissionIdx = idx + 1;
  saveGame();
  setTimeout(() => render(), 300);
}

function execEventChoice(missionIdx, choiceIdx) {
  const choices = window._ch5EventChoices;
  if (choices && choices[choiceIdx]) {
    choices[choiceIdx].action();
  }
  setTimeout(() => executeMission(), 600);
}

function splitFail() {
  const L = LISTINGS.find(l=>l.id===state.chosenListing);
  const amount = L ? Math.floor(L.deposit * 0.9) : 100_000_000;
  modifyBudget(-amount);
  state.flags.balanceSplit = true;
  state.scoreLog.push('balance_split');
  modifyStress(15);

  setTimeout(() => {
    state.ch5MissionIdx = (state.ch5MissionIdx || 0) + 1;
    saveGame();
    render();
  }, 1500);
}

function raiseLimitNow() {

  `);
}

function ch6Advance() {
  state.ch6DayIdx = (state.ch6DayIdx || 0) + 1;
  saveGame();
  render();
}

/* -------------------------------------------------------------------
   [LOGIC] 점수 계산 (수정 용이하게 분리)
------------------------------------------------------------------- */
function calculateScore() {
  const checklistCount = Object.keys(state.checklist).filter(k => state.checklist[k]).length;
  const knowledge = state.knowledge;
  const correctChoices = state.scoreLog.filter(s => s.includes('correct')).length;
  const wrongChoices = state.scoreLog.filter(s => s.includes('wrong') || s.includes('ignore')).length;

  // 위험 매물 선택 감점
  const chosen = LISTINGS.find(l => l.id === state.chosenListing);
  const dangerPenalty = chosen && chosen.danger ? -15 : 0;

  // 잔금 분할 송금 감점
  const splitPenalty = state.scoreLog.includes('balance_split') ? -5 : 0;

  // 전입신고/확정일자 누락 큰 감점
  const protectionPenalty = (!state.flags.jeonipDone || !state.flags.hwakjeongDone) ? -20 : 10;

  const score = Math.max(0, Math.min(100,
    checklistCount * 2 +
    Math.min(knowledge, 30) +
    correctChoices * 5 -
    wrongChoices * 3 +
    dangerPenalty +
    splitPenalty +
    protectionPenalty
  ));

  let grade = 'D';
  if (score >= 80) grade = 'A';
  else if (score >= 60) grade = 'B';
  else if (score >= 40) grade = 'C';

  return { score, grade, checklistCount, knowledge, correctChoices, wrongChoices, dangerPenalty, protectionPenalty };
}
